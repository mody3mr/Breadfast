<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Branch Details</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){
const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML=`
<img class="avatar" src="breadfastlogo.jpg">

<h2>${b.nameAr||b.name}</h2>

<div class="box">👤 المدير: ${b.managerName}</div>
<div class="box">📞 الهاتف: ${b.phone}</div>
<div class="box">💬 واتساب: ${b.whatsapp}</div>
<div class="box">⏰ المواعيد: ${b.workingHours}</div>

<div class="box">
<b>👥 الموظفين</b><br><br>
${(b.employees||[]).map(e=>"• "+e).join("<br>")}
</div>

<a class="btn" href="${b.location}" target="_blank">فتح الموقع</a>
`;
}

load();
</script>

</body>
</html>
