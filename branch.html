<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفرع</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background: radial-gradient(circle at top,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:440px;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,0.6);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:25px;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
}

.header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid white;
    object-fit:cover;
}

.header h2{
    margin:10px 0 0;
    font-size:20px;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:space-around;
    background:rgba(0,0,0,0.2);
}

.tab{
    flex:1;
    padding:12px;
    cursor:pointer;
    text-align:center;
    font-size:13px;
    transition:0.3s;
    color:#cbd5e1;
}

.tab.active{
    background:#7c3aed;
    color:white;
}

/* CONTENT */
.content{
    padding:20px;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.08);
    padding:12px;
    border-radius:14px;
    margin-bottom:10px;
    font-size:14px;
    transition:0.2s;
}

.box:hover{
    transform:translateY(-2px);
}

/* BUTTON */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    text-decoration:none;
    margin-top:15px;
    font-weight:bold;
}

.btn:hover{
    transform:scale(1.03);
}

/* hide sections */
.section{
    display:none;
}

.section.active{
    display:block;
}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="tabs">
<div class="tab active" onclick="showTab(0)">المدير</div>
<div class="tab" onclick="showTab(1)">المواعيد</div>
<div class="tab" onclick="showTab(2)">الموظفين</div>
</div>

<div class="content">

<!-- MANAGER -->
<div class="section active">
<div class="box">👤 مدير الفرع: ${b.managerName}</div>
<div class="box">📞 رقم مديرالفرع: ${b.phone}</div>
<div class="box">💬 واتساب مدير الفرع: ${b.whatsapp}</div>
</div>

<!-- HOURS -->
<div class="section">
<div class="box">⏰ ${b.workingHours}</div>
<a class="btn" href="${b.location}" target="_blank">📍 لوكيشن الفرع</a>
</div>

<!-- EMPLOYEES -->
<div class="section">
<div class="box">
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>
</div>

</div>

`;

window.showTab = function(i){

let tabs = document.querySelectorAll(".tab");
let sections = document.querySelectorAll(".section");

tabs.forEach(t=>t.classList.remove("active"));
sections.forEach(s=>s.classList.remove("active"));

tabs[i].classList.add("active");
sections[i].classList.add("active");

};

}

load();
</script>

</body>
</html>
