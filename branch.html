<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Branch Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,0.6);
    color:white;
}

/* HEADER */
.header{
    padding:25px;
    text-align:center;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
}

.header img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.header h2{
    margin:10px 0 0;
    font-size:20px;
}

/* CONTENT */
.content{
    padding:20px;
}

/* INFO BOXES */
.box{
    background:#1f2937;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:14px;
}

/* EMPLOYEES */
.section{
    margin-top:15px;
    padding:15px;
    background:#0f172a;
    border-radius:12px;
}

.section h3{
    margin:0 0 10px;
    font-size:14px;
    color:#a78bfa;
}

/* BUTTON */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin-top:15px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:#3b82f6;
    font-weight:bold;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.02);
}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="content">

<div class="box">👤 Manager: ${b.managerName}</div>
<div class="box">📞 Phone: ${b.phone}</div>
<div class="box">⏰ Working Hours: ${b.workingHours}</div>

<div class="section">
<h3>👥 Employees</h3>
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>

<a class="btn" href="${b.location}" target="_blank">
📍 Open Location
</a>

</div>

`;

}

load();
</script>

</body>
</html>
