<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفرع</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background: radial-gradient(circle at top,#1e1b4b,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:440px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,0.7);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:25px;
    background:linear-gradient(135deg,#7c3aed,#ec4899,#f97316);
}

.header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid white;
    object-fit:cover;
}

.header h2{
    margin:10px 0 0;
    font-size:20px;
}

/* CONTENT */
.content{
    padding:20px;
}

/* TITLES */
.title{
    font-size:12px;
    color:#c4b5fd;
    margin:12px 0 6px;
    font-weight:bold;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.10);
    padding:12px;
    border-radius:14px;
    font-size:14px;
    margin-bottom:10px;
    cursor:pointer;
}

/* EMPLOYEES */
.emp-card{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.08);
    padding:10px 12px;
    border-radius:12px;
    margin-bottom:8px;
    font-size:13px;
}

.emp-name{
    font-weight:bold;
}

.icon-btn{
    width:34px;
    height:34px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:white;
}

.whatsapp{background:#25D366;}
.call{background:#3b82f6;}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#111827;
    padding:20px;
    border-radius:15px;
    width:260px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

.modal-btn{
    display:block;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.mwa{background:#25D366;}
.mcall{background:#3b82f6;}

.close{
    margin-top:10px;
    display:block;
    color:#aaa;
    cursor:pointer;
    font-size:13px;
}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<!-- POPUP -->
<div class="modal" id="modal">
    <div class="modal-content">
        <div style="margin-bottom:10px;">اختر طريقة الاتصال</div>

        <a id="waBtn" class="modal-btn mwa" target="_blank">💬 واتساب</a>
        <a id="callBtn" class="modal-btn mcall">📞 اتصال</a>

        <div class="close" onclick="closeModal()">إغلاق</div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

let phoneNumber = "";

window.openModal = function(){
    document.getElementById("modal").style.display="flex";
}

window.closeModal = function(){
    document.getElementById("modal").style.display="none";
}

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

phoneNumber = String(b.phone).replace('+','');

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="content">

<div class="title">مدير الفرع</div>
<div class="box">${b.managerName}</div>

<div class="title">رقم المدير (اضغط للتواصل)</div>
<div class="box" onclick="openModal()">${b.phone}</div>

<div class="title">مواعيد العمل</div>
<div class="box">${b.workingHours}</div>

<div class="title">الموظفين</div>

<div>
${(b.employees || []).map(e => `
<div class="emp-card">

<div class="emp-name">👤 ${e.name || e}</div>

<div>
<a class="icon-btn whatsapp"
href="https://wa.me/${String(e.phone || '').replace('+','')}"
target="_blank">💬</a>

<a class="icon-btn call"
href="tel:${e.phone || ''}">📞</a>
</div>

</div>
`).join("")}
</div>

<a class="box" style="display:block;text-align:center;text-decoration:none;"
href="${b.location}" target="_blank">
📍 فتح الموقع
</a>

</div>

`;

document.getElementById("waBtn").href =
"https://wa.me/" + phoneNumber;

document.getElementById("callBtn").href =
"tel:" + phoneNumber;

}

load();
</script>

</body>
</html>
