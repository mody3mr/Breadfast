<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفرع</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background: radial-gradient(circle at top,#1e1b4b,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:440px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 30px 90px rgba(0,0,0,0.7);
    color:white;
}

/* HEADER */
.header{
    text-align:center;
    padding:25px;
    background:linear-gradient(135deg,#7c3aed,#ec4899,#f97316);
}

.header img{
    width:90px;
    height:90px;
    border-radius:50%;
    border:3px solid white;
    object-fit:cover;
}

.header h2{
    margin:10px 0 0;
    font-size:20px;
}

/* CONTENT */
.content{
    padding:20px;
}

/* SECTION TITLE */
.title{
    font-size:12px;
    color:#c4b5fd;
    margin:14px 0 6px;
    font-weight:bold;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.10);
    padding:12px;
    border-radius:14px;
    font-size:14px;
    margin-bottom:10px;
    transition:0.2s;
}

.box:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.15);
}

/* EMPLOYEES */
.employees{
    background:rgba(255,255,255,0.07);
    padding:12px;
    border-radius:14px;
    font-size:14px;
}

/* BUTTONS */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    margin-top:12px;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.03);
}

/* ACTION COLORS */
.map{background:#3b82f6;}
.call{background:#22c55e;}
.wa{background:#25D366;}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="content">

<div class="title">مدير الفرع</div>
<div class="box">${b.managerName}</div>

<div class="title">رقم المدير</div>
<div class="box">${b.phone}</div>

<div class="title">واتساب المدير</div>
<a class="btn wa" href="https://wa.me/${String(b.whatsapp).replace('+','')}" target="_blank">
💬 تواصل واتساب
</a>

<div class="title">مواعيد العمل</div>
<div class="box">${b.workingHours}</div>

<div class="title">الموظفين</div>
<div class="employees">
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>

<a class="btn map" href="${b.location}" target="_blank">
📍 فتح الموقع
</a>

</div>

`;

}

load();
</script>

</body>
</html>
