<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفرع</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* الكارت */
.card{
    width:100%;
    max-width:420px;
    background:#111827;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 25px 70px rgba(0,0,0,0.6);
    color:white;
}

/* الهيدر */
.header{
    padding:25px;
    text-align:center;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
}

.header img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.header h2{
    margin:10px 0 0;
    font-size:20px;
}

/* المحتوى */
.content{
    padding:20px;
}

/* قسم المدير */
.section-title{
    color:#a78bfa;
    font-size:14px;
    margin:15px 0 8px;
    font-weight:bold;
}

.box{
    background:#1f2937;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:14px;
}

/* الموظفين */
.section{
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

/* زر الموقع */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    margin-top:15px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:#3b82f6;
    font-weight:bold;
}

.btn:hover{
    transform:scale(1.02);
}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="content">

<!-- 👤 قسم المدير -->
<div class="section-title">مدير الفرع</div>
<div class="box">${b.managerName}</div>

<div class="section-title">رقم مدير الفرع</div>
<div class="box">${b.phone}</div>

<div class="section-title">واتساب مدير الفرع</div>
<div class="box">${b.whatsapp}</div>

<!-- ⏰ مواعيد -->
<div class="section-title">مواعيد العمل</div>
<div class="box">${b.workingHours}</div>

<!-- 👥 الموظفين -->
<div class="section">
<div class="section-title">الموظفين</div>
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>

<a class="btn" href="${b.location}" target="_blank">
📍 فتح الموقع
</a>

</div>

`;

}

load();
</script>

</body>
</html>
