<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفرع</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f6f8;
    display:flex;
    justify-content:center;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,0.1);
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    background:#111827;
    color:white;
}

.header img{
    width:80px;
    height:80px;
    border-radius:50%;
    margin-bottom:10px;
    border:2px solid white;
}

/* BODY */
.content{
    padding:20px;
}

/* SECTION */
.section{
    margin-bottom:15px;
}

.title{
    font-size:12px;
    color:#6b7280;
    margin-bottom:6px;
}

/* INFO */
.box{
    background:#f3f4f6;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    color:#111827;
}

/* EMPLOYEES */
.employees{
    background:#f9fafb;
    padding:12px;
    border-radius:10px;
    font-size:14px;
}

/* BUTTONS */
.btn{
    display:block;
    text-align:center;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    margin-top:10px;
}

.map{background:#2563eb;color:white;}
.call{background:#16a34a;color:white;}
.wa{background:#22c55e;color:white;}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="content">

<div class="section">
<div class="title">مدير الفرع</div>
<div class="box">${b.managerName}</div>
</div>

<div class="section">
<div class="title">رقم المدير</div>
<div class="box">${b.phone}</div>
</div>

<div class="section">
<div class="title">واتساب المدير</div>
<a class="btn wa" href="https://wa.me/${String(b.whatsapp).replace('+','')}" target="_blank">
مراسلة واتساب
</a>
</div>

<div class="section">
<div class="title">مواعيد العمل</div>
<div class="box">${b.workingHours}</div>
</div>

<div class="section">
<div class="title">الموظفين</div>
<div class="employees">
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>
</div>

<a class="btn map" href="${b.location}" target="_blank">
فتح الموقع
</a>

</div>

`;

}

load();
</script>

</body>
</html>
