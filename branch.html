<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تفاصيل الفرع</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b0f1a;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    min-height:100vh;
}

/* SHEET */
.sheet{
    width:100%;
    max-width:500px;
    background:#111827;
    border-top-left-radius:25px;
    border-top-right-radius:25px;
    padding:20px;
    box-shadow:0 -20px 60px rgba(0,0,0,0.6);
    color:white;
    animation:up 0.4s ease;
}

@keyframes up{
    from{transform:translateY(100px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:15px;
}

.header img{
    width:80px;
    height:80px;
    border-radius:50%;
    border:2px solid #7c3aed;
}

.header h2{
    margin:10px 0 0;
    font-size:18px;
}

/* SECTION */
.section{
    margin-top:15px;
}

/* TITLE */
.title{
    font-size:12px;
    color:#a78bfa;
    margin-bottom:6px;
}

/* CARD ROW */
.row{
    background:#1f2937;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    font-size:14px;
}

/* EMPLOYEES */
.emps{
    background:#0f172a;
    padding:12px;
    border-radius:12px;
    font-size:14px;
}

/* BUTTONS */
.actions{
    display:grid;
    gap:10px;
    margin-top:15px;
}

.btn{
    text-align:center;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.map{background:#3b82f6;}
.call{background:#22c55e;}
.wa{background:#25D366;}

</style>
</head>

<body>

<div class="sheet" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="section">
<div class="title">مدير الفرع</div>
<div class="row">${b.managerName}</div>

<div class="title">رقم المدير</div>
<div class="row">${b.phone}</div>

<div class="title">واتساب المدير</div>
<div class="row">${b.whatsapp}</div>

<div class="title">مواعيد العمل</div>
<div class="row">${b.workingHours}</div>
</div>

<div class="section">
<div class="title">الموظفين</div>
<div class="emps">
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>
</div>

<div class="actions">

<a class="btn map" href="${b.location}" target="_blank">📍 الموقع</a>

<a class="btn call" href="tel:${b.phone}">📞 اتصال</a>

<a class="btn wa" href="https://wa.me/${String(b.whatsapp).replace('+','')}" target="_blank">
💬 واتساب
</a>

</div>

`;

}

load();
</script>

</body>
</html>
