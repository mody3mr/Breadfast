<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Branch Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background: radial-gradient(circle at top,#111827,#0f172a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* CARD */
.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 25px 80px rgba(0,0,0,0.5);
    color:white;
}

/* HEADER */
.header{
    padding:25px;
    text-align:center;
    background:linear-gradient(135deg,#7c3aed,#ec4899);
}

.header img{
    width:95px;
    height:95px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
}

.header h2{
    margin:10px 0 0;
    font-size:20px;
}

/* BODY */
.content{
    padding:20px;
}

/* info cards */
.info{
    display:grid;
    gap:10px;
}

.box{
    background:rgba(255,255,255,0.12);
    padding:12px;
    border-radius:14px;
    font-size:14px;
    transition:0.2s;
}

.box:hover{
    transform:translateY(-2px);
    background:rgba(255,255,255,0.18);
}

/* employees */
.section{
    margin-top:15px;
    padding:12px;
    border-radius:14px;
    background:rgba(255,255,255,0.10);
}

.section h3{
    margin:0 0 10px;
    font-size:14px;
}

/* buttons */
.actions{
    display:grid;
    gap:10px;
    margin-top:15px;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.03);
}

.map{background:#3b82f6;}
.call{background:#22c55e;}
.whatsapp{background:#25D366;}

/* mobile */
@media(max-width:480px){
    .card{border-radius:18px;}
}

</style>
</head>

<body>

<div class="card" id="content">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");

async function load(){

const snap = await getDoc(doc(db,"branches",id));
const b = snap.data();

document.getElementById("content").innerHTML = `

<div class="header">
<img src="breadfastlogo.jpg">
<h2>${b.nameAr || b.name}</h2>
</div>

<div class="content">

<div class="info">

<div class="box">👤 Manager: ${b.managerName}</div>
<div class="box">📞 Phone: ${b.phone}</div>
<div class="box">⏰ Working Hours: ${b.workingHours}</div>

</div>

<div class="section">
<h3>👥 Employees</h3>
${(b.employees || []).map(e=>"• "+e).join("<br>")}
</div>

<div class="actions">

<a class="btn map" href="${b.location}" target="_blank">📍 Open Map</a>

<a class="btn call" href="tel:${b.phone}">📞 Call</a>

<a class="btn whatsapp" href="https://wa.me/${b.whatsapp}" target="_blank">💬 WhatsApp</a>

</div>

</div>

`;

}

load();
</script>

</body>
</html>
