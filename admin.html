<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPs Dashboard Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f6f7fb;
}

/* LAYOUT */
.app{
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#0f172a;
    color:#fff;
    height:100vh;
    position:fixed;
    right:0;
    top:0;
    padding:20px;
}

.menu{
    padding:10px;
    margin-bottom:6px;
    border-radius:8px;
    color:#cbd5e1;
}

.menu:hover{
    background:#1e293b;
}

/* MAIN */
.main{
    margin-right:240px;
    width:100%;
    padding:25px;
}

/* TOP */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.search{
    padding:10px;
    width:250px;
    border-radius:8px;
    border:1px solid #ddd;
}

.add{
    padding:10px 14px;
    background:#6366f1;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* CARD */
.card{
    background:#fff;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.branch{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    border-radius:10px;
    background:#fff;
    margin-top:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.box{
    background:#fff;
    padding:20px;
    width:350px;
    border-radius:12px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:8px;
    border:1px solid #ddd;
    border-radius:8px;
}

.save{
    width:100%;
    padding:10px;
    background:#6366f1;
    color:#fff;
    border:none;
    border-radius:8px;
}

.emp input{
    margin-top:5px;
}

</style>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>FPs Admin</h3>
<div class="menu">Dashboard</div>
<div class="menu">Branches</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="top">
<input class="search" id="search" placeholder="Search">
<button class="add" onclick="openModal()">+ Add Branch</button>
</div>

<div id="list"></div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<input id="name" placeholder="Branch Name">
<input id="manager" placeholder="Manager Name">
<input id="phone" placeholder="Phone">
<input id="hours" placeholder="Working Hours">

<h4>Employees</h4>
<div id="empBox"></div>
<button onclick="addEmp()">+ Add Employee</button>

<button class="save" onclick="save()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee"
});

const db = getFirestore(app);

let branches=[];
let editId=null;
let employees=[];

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"branches"));

branches=[];
snap.forEach(d=>branches.push({id:d.id,...d.data()}));

render();
}

/* RENDER */
function render(){
const box=document.getElementById("list");
box.innerHTML="";

branches.forEach(b=>{
box.innerHTML+=`
<div class="branch">
<div>
<strong>${b.name}</strong><br>
<small>${b.manager}</small><br>
<small>${b.hours || ""}</small>
</div>

<div>
<button onclick="edit('${b.id}')">Edit</button>
<button onclick="del('${b.id}')">Delete</button>
</div>
</div>
`;
});
}

/* OPEN */
window.openModal=()=>{
editId=null;
reset();
document.getElementById("modal").style.display="flex";
}

/* RESET */
function reset(){
document.getElementById("name").value="";
document.getElementById("manager").value="";
document.getElementById("phone").value="";
document.getElementById("hours").value="";
employees=[];
drawEmp();
}

/* EMP */
window.addEmp=()=>{
employees.push({name:"",phone:""});
drawEmp();
}

function drawEmp(){
const box=document.getElementById("empBox");
box.innerHTML="";

employees.forEach((e,i)=>{
box.innerHTML+=`
<input placeholder="Employee Name"
oninput="employees[${i}].name=this.value">

<input placeholder="Employee Phone"
oninput="employees[${i}].phone=this.value">
`;
});
}

/* SAVE */
window.save=async()=>{

const data={
name:document.getElementById("name").value,
manager:document.getElementById("manager").value,
phone:document.getElementById("phone").value,
hours:document.getElementById("hours").value,
employees:[...employees]
};

if(editId){
await updateDoc(doc(db,"branches",editId),data);
}else{
await addDoc(collection(db,"branches"),data);
}

close();
load();
}

/* EDIT */
window.edit=(id)=>{
const b=branches.find(x=>x.id===id);
editId=id;

reset();

document.getElementById("name").value=b.name||"";
document.getElementById("manager").value=b.manager||"";
document.getElementById("phone").value=b.phone||"";
document.getElementById("hours").value=b.hours||"";

employees = b.employees ? [...b.employees] : [];
drawEmp();

document.getElementById("modal").style.display="flex";
}

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

function close(){
document.getElementById("modal").style.display="none";
}

window.close=close;

load();

</script>

</body>
</html>
