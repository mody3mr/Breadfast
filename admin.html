<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FPs Admin Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{

margin:0;
background:#f8fafc;

}


/* ================= LOGIN ================= */

.login{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#7c3aed,#ec4899);

}


.login-card{

background:white;

width:380px;

padding:35px;

border-radius:25px;

box-shadow:0 25px 60px #0004;

text-align:center;

}



.login-card h1{

margin-bottom:25px;

color:#111827;

}



.input{

width:100%;

padding:14px;

margin:10px 0;

border-radius:12px;

border:1px solid #ddd;

font-size:15px;

}



.login-btn{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#7c3aed;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}


.login-btn:hover{

transform:translateY(-3px);

}




/* ================= DASHBOARD ================= */


.dashboard{

display:none;

}



.sidebar{

position:fixed;

right:0;

top:0;

height:100vh;

width:250px;

background:#111827;

color:white;

padding:25px;

}



.logo{

font-size:22px;

font-weight:bold;

margin-bottom:35px;

}



.menu{

padding:14px;

border-radius:12px;

cursor:pointer;

margin-bottom:10px;

transition:.3s;

}


.menu:hover{

background:#374151;

}




.main{

margin-right:250px;

padding:30px;

}




.top{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}



.admin{

background:white;

padding:12px 20px;

border-radius:15px;

box-shadow:0 10px 25px #0001;

}



/* CARDS */


.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}



.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 15px 35px #0001;

animation:up .5s;

}


.card h2{

font-size:35px;

margin:10px 0;

color:#7c3aed;

}



@keyframes up{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* TOAST */


#toast{

position:fixed;

bottom:30px;

right:30px;

padding:15px 25px;

border-radius:15px;

background:#111827;

color:white;

display:none;

z-index:99;

}



</style>


</head>


<body>



<!-- LOGIN -->


<div class="login" id="loginBox">


<div class="login-card">


<h1>
FPs Admin
</h1>


<input 
class="input"
id="email"
placeholder="Email">


<input 
class="input"
id="password"
type="password"
placeholder="Password">



<button 
class="login-btn"
onclick="login()">

Login

</button>


</div>


</div>







<!-- DASHBOARD -->


<div class="dashboard" id="dashboard">



<div class="sidebar">


<div class="logo">

☕ FPs Coffee

</div>


<div class="menu">

🏠 Dashboard

</div>


<div class="menu">

📍 Branches

</div>


<div class="menu">

👥 Users

</div>


<div class="menu">

⚙ Settings

</div>


<div class="menu" onclick="logout()">

🚪 Logout

</div>


</div>







<div class="main">


<div class="top">


<h1>
Welcome Admin 👋
</h1>



<div class="admin">

Admin Account

</div>


</div>





<div class="cards">



<div class="card">

<p>Total Branches</p>

<h2 id="count">
0
</h2>


</div>



<div class="card">

<p>Total Visits</p>

<h2>

0

</h2>


</div>




<div class="card">

<p>Active Admins</p>

<h2>

1

</h2>


</div>



</div>



</div>


</div>






<div id="toast"></div>






<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getAuth,

signInWithEmailAndPassword,

signOut

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


import {

getFirestore,

collection,

getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",

authDomain:"breadfast-coffee.firebaseapp.com",

projectId:"breadfast-coffee",

storageBucket:"breadfast-coffee.firebasestorage.app",

messagingSenderId:"803906042715",

appId:"1:803906042715:web:1e8977716adc54947b787e"

};



const app=initializeApp(firebaseConfig);

const auth=getAuth(app);

const db=getFirestore(app);






function toast(msg){

let t=document.getElementById("toast");

t.innerHTML=msg;

t.style.display="block";


setTimeout(()=>{

t.style.display="none";

},3000);


}







window.login=async function(){


let email=document.getElementById("email").value.trim();

let pass=document.getElementById("password").value.trim();



if(!email){

toast("⚠️ اكتب البريد الإلكتروني");

return;

}



if(!pass){

toast("⚠️ اكتب كلمة المرور");

return;

}



try{


await signInWithEmailAndPassword(auth,email,pass);


toast("✅ تم تسجيل الدخول");


loginBox.style.display="none";

dashboard.style.display="block";


loadBranches();


}


catch(e){


if(e.code=="auth/user-not-found"){

toast("❌ البريد غير موجود");

}

else if(e.code=="auth/wrong-password"){

toast("❌ كلمة المرور غير صحيحة");

}

else{

toast("❌ بيانات الدخول غير صحيحة");

}


}



}





async function loadBranches(){


let snap=await getDocs(collection(db,"branches"));


document.getElementById("count").innerHTML=snap.size;


}




window.logout=function(){

signOut(auth);

location.reload();

}



</script>



</body>

</html>
