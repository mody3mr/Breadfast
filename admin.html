<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#loginBox{
    width:320px;
    margin:120px auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* APP */
#app{
    display:none;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111827;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    padding:15px;
}

.sidebar button{
    background:#1f2937;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:20px;
}

.page{display:none;}
.active{display:block;}

/* TABLE */
table{
    width:100%;
    background:#1e293b;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #334155;
}

.delete{background:#ef4444;}

/* TOAST */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    padding:12px 18px;
    border-radius:10px;
    background:#22c55e;
    color:white;
    opacity:0;
    transform:translateY(-20px);
    transition:0.3s;
    z-index:9999;
}

.toast.show{
    opacity:1;
    transform:translateY(0);
}

.toast.error{
    background:#ef4444;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Dashboard</h3>

<button onclick="show('home')">Home</button>
<button onclick="show('branches')">Branches</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="page active">
<h2>Welcome Admin</h2>
<h3 id="count">0 branches</h3>
</div>

<!-- BRANCHES -->
<div id="branches" class="page">

<h2>Branches</h2>

<input id="nameEn" placeholder="Name EN">
<input id="nameAr" placeholder="Name AR">
<input id="map" placeholder="Map">

<button onclick="addBranch()">Add Branch</button>

<table>
<thead>
<tr>
<th>EN</th>
<th>AR</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
  authDomain: "breadfast-coffee.firebaseapp.com",
  projectId: "breadfast-coffee",
  storageBucket: "breadfast-coffee.firebasestorage.app",
  messagingSenderId: "803906042715",
  appId: "1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let branches = [];

/* ================= TOAST ================= */
function toast(msg,type="success"){
    let t=document.createElement("div");
    t.className="toast";
    t.innerText=msg;
    if(type==="error") t.classList.add("error");
    document.body.appendChild(t);

    setTimeout(()=>t.classList.add("show"),100);
    setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300)},2500);
}

/* ================= LOGIN ================= */
window.login = function(){

    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    signInWithEmailAndPassword(auth,email,pass)
    .then(()=>{
        toast("Login successful 🔥");
    })
    .catch((err)=>{

        if(err.code === "auth/user-not-found"){
            toast("Email not registered ❌","error");
        }
        else if(err.code === "auth/wrong-password"){
            toast("Wrong password ❌","error");
        }
        else{
            toast("Login failed ❌","error");
        }
    });
};

/* ================= AUTH ================= */
onAuthStateChanged(auth,(user)=>{

    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
    }else{
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

/* ================= LOGOUT ================= */
window.logout = function(){
    signOut(auth);
};

/* ================= REALTIME ================= */
onSnapshot(collection(db,"branches"),(snap)=>{

    branches=[];
    snap.forEach(d=>{
        branches.push({id:d.id,...d.data()});
    });

    document.getElementById("count").innerText = branches.length + " branches";

    render();
});

/* ================= ADD ================= */
window.addBranch = async function(){

    await addDoc(collection(db,"branches"),{
        name:nameEn.value,
        nameAr:nameAr.value,
        map:map.value
    });

    toast("Branch added ✅");
};

/* ================= DELETE ================= */
window.deleteBranch = async function(id){

    await deleteDoc(doc(db,"branches",id));

    toast("Branch deleted 🗑️");
};

/* ================= RENDER ================= */
function render(){

    let table=document.getElementById("table");
    table.innerHTML="";

    branches.forEach(b=>{

        table.innerHTML+=`
        <tr>
            <td>${b.name}</td>
            <td>${b.nameAr}</td>
            <td>
                <button onclick="deleteBranch('${b.id}')">Delete</button>
            </td>
        </tr>
        `;
    });
}

/* ================= NAV ================= */
window.show=function(id){

    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

    document.getElementById(id).classList.add("active");
};

</script>

</body>
</html>
