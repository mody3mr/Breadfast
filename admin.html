<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
            authDomain: "breadfast-coffee.firebaseapp.com",
            projectId: "breadfast-coffee",
            storageBucket: "breadfast-coffee.firebasestorage.app",
            messagingSenderId: "803906042715",
            appId: "1:803906042715:web:1e8977716adc54947b787e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- نظام تسجيل الدخول ---
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById('login-modal').classList.remove('hidden');
            }
        });

        window.login = async () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('login-modal').classList.add('hidden');
            } catch (error) {
                alert("خطأ في تسجيل الدخول: تأكد من البريد وكلمة المرور");
            }
        };

        // --- باقي الكود الخاص بك ---
        let localBranchesCache = [];

        onSnapshot(collection(db, "branches"), (snapshot) => {
            const data = [];
            let totalVisits = 0;
            snapshot.forEach(doc => {
                const bData = doc.data();
                data.push({ id: doc.id, ...bData });
                if(bData.visits) totalVisits += Number(bData.visits);
            });
            localBranchesCache = data;
            document.getElementById("firebase-branches-count").innerText = data.length + " فروع";
            document.getElementById("total-visits-count").innerText = totalVisits.toLocaleString() + " زيارة";
            renderAdminBranches(data);
        });

        function renderAdminBranches(list) {
            const container = document.getElementById("branches-list-container");
            container.innerHTML = "";
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 py-8">لا توجد فروع حالياً.</div>`;
                return;
            }
            list.forEach(b => {
                const mapUrl = b.location || "https://maps.google.com";
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 transition-all hover:shadow-md";
                card.innerHTML = `
                    <div class="flex items-center space-x-4 space-x-reverse">
                        <a href="${mapUrl}" target="_blank" class="w-10 h-10 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg flex items-center justify-center text-lg font-bold flex-shrink-0 transition-colors">
                            <i class="fa-solid fa-location-dot"></i>
                        </a>
                        <div class="text-right">
                            <h5 class="font-bold text-gray-800 text-base">${b.nameAr || b.name} (${b.name || b.nameAr})</h5>
                            <p class="text-xs text-gray-400 mt-0.5">المدير: ${b.managerName || 'لا يوجد'} | هاتف: ${b.phone || 'لا يوجد'} | المواعيد: ${b.workingHours || 'غير محددة'}</p>
                            <span class="text-[11px] bg-amber-50 text-amber-700 px-2 py-0.5 rounded-md mt-1 inline-block font-medium">عدد الموظفين: ${(b.employees || []).length}</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 space-x-reverse self-end sm:self-center">
                        <button onclick='window.prepareEdit("${b.id}")' class="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"><i class="fa-solid fa-pen-to-square ml-1.5"></i> تعديل</button>
                        <button onclick='window.deleteBranch("${b.id}")' class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"><i class="fa-solid fa-trash ml-1.5"></i> حذف</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        document.getElementById("branchForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const bId = document.getElementById("branchId").value;
            const docData = {
                nameAr: document.getElementById("branchNameAr").value,
                name: document.getElementById("branchNameEn").value,
                managerName: document.getElementById("managerName").value,
                phone: document.getElementById("managerPhone").value,
                workingHours: document.getElementById("workingHours").value,
                location: document.getElementById("branchLocation").value,
                employees: Array.from(document.querySelectorAll(".employee-row")).map(r => ({
                    name: r.querySelector(".emp-name-input").value,
                    phone: r.querySelector(".emp-phone-input").value
                }))
            };
            try {
                if (bId === "") {
                    docData.visits = 0;
                    await addDoc(collection(db, "branches"), docData);
                } else {
                    await updateDoc(doc(db, "branches", bId), docData);
                }
                window.closeModal();
            } catch (e) { alert("خطأ في الحفظ"); }
        });

        window.deleteBranch = async (id) => { if(confirm("تأكيد الحذف؟")) await deleteDoc(doc(db, "branches", id)); };
        
        window.prepareEdit = (id) => {
            const b = localBranchesCache.find(i => i.id === id);
            document.getElementById("branchId").value = b.id;
            document.getElementById("branchNameAr").value = b.nameAr;
            document.getElementById("branchNameEn").value = b.name;
            document.getElementById("managerName").value = b.managerName;
            document.getElementById("managerPhone").value = b.phone;
            document.getElementById("workingHours").value = b.workingHours;
            document.getElementById("branchLocation").value = b.location;
            window.openModal();
        };

        window.addEmployeeField = (name = '', phone = '') => {
            const container = document.getElementById("employees-fields-container");
            const rowId = 'emp_' + Date.now();
            const div = document.createElement("div");
            div.id = rowId; div.className = "employee-row grid grid-cols-2 gap-4 mt-2";
            div.innerHTML = `<input value="${name}" class="emp-name-input border p-1" placeholder="الاسم"><input value="${phone}" class="emp-phone-input border p-1" placeholder="الهاتف"><button onclick="document.getElementById('${rowId}').remove()">X</button>`;
            container.appendChild(div);
        };

        window.openModal = () => document.getElementById('branchModal').classList.remove('hidden', 'opacity-0');
        window.closeModal = () => document.getElementById('branchModal').classList.add('hidden');
        window.searchAdminBranches = () => { /* منطق البحث الخاص بك */ };
    </script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- مودال تسجيل الدخول -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-xl shadow-lg w-80 text-center">
            <h2 class="text-xl font-bold mb-4">تسجيل دخول الإدارة</h2>
            <input type="email" id="admin-email" placeholder="البريد" class="w-full border p-2 mb-2">
            <input type="password" id="admin-pass" placeholder="كلمة المرور" class="w-full border p-2 mb-4">
            <button onclick="window.login()" class="bg-blue-600 text-white w-full py-2 rounded">دخول</button>
        </div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <!-- المحتوى الخاص بك (كما هو) -->
        <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="h-16 flex items-center justify-center bg-slate-950 font-bold text-xl tracking-wide border-b border-slate-800">
                <i class="fa-solid mt-1 ml-2 fa-mug-hot text-amber-500"></i> FPs Coffee
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2">
                <a href="#" class="flex items-center px-4 py-2.5 bg-blue-600 text-white rounded-lg"><i class="fa-solid fa-house ml-3"></i> الرئيسية</a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <!-- (باقي الكود الخاص بك للـ Header و الـ Main والـ Modal سيعمل بشكل سليم) -->
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
                <div class="flex items-center bg-gray-50 border rounded-lg px-3 w-64">
                    <input type="text" id="adminSearch" placeholder="بحث..." onkeyup="window.searchAdminBranches()" class="bg-transparent focus:outline-none w-full">
                </div>
            </header>
            <main class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border"><p>إجمالي الفروع</p><h3 id="firebase-branches-count" class="text-3xl font-bold">...</h3></div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border"><p>إجمالي الزيارات</p><h3 id="total-visits-count" class="text-3xl font-bold">0</h3></div>
                </div>
                <div id="branches-list-container" class="mt-6"></div>
            </main>
        </div>
    </div>
    
    <!-- Modal و باقي الأكواد التكميلية -->
</body>
</html>
