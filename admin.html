<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPs Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f6f7fb;
}

/* LAYOUT */
.app{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#0f172a;
    color:white;
    position:fixed;
    right:0;
    top:0;
    bottom:0;
    padding:20px;
}

.logo{
    font-weight:bold;
    margin-bottom:20px;
}

.menu{
    padding:10px;
    margin-bottom:6px;
    border-radius:8px;
    color:#cbd5e1;
}

.menu:hover{
    background:#1e293b;
}

/* MAIN */
.main{
    margin-right:240px;
    width:100%;
    padding:25px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

.search{
    padding:10px;
    width:250px;
    border:1px solid #ddd;
    border-radius:8px;
}

.add-btn{
    background:#6366f1;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:15px;
}

.card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 1px 6px rgba(0,0,0,0.06);
}

.card h2{
    color:#6366f1;
    margin-top:8px;
}

/* LIST */
.section{
    margin-top:25px;
}

.branch{
    background:white;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 1px 6px rgba(0,0,0,0.05);
}

.branch small{
    color:#6b7280;
}

.actions button{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    margin-left:5px;
}

.edit{
    background:#3b82f6;
    color:white;
}

.delete{
    background:#ef4444;
    color:white;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:white;
    padding:20px;
    border-radius:12px;
    width:350px;
    max-height:90vh;
    overflow:auto;
}

.modal-box input{
    width:100%;
    padding:10px;
    margin-bottom:8px;
    border:1px solid #ddd;
    border-radius:8px;
}

.save{
    width:100%;
    background:#6366f1;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
}

/* EMP */
.emp-input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border:1px solid #ddd;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">☕ FPs Admin</div>
<div class="menu">Dashboard</div>
<div class="menu">Branches</div>
<div class="menu">Settings</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<input class="search" id="search" placeholder="Search branches...">
<button class="add-btn" onclick="openModal()">+ Add Branch</button>
</div>

<div class="cards">
<div class="card">Branches<h2 id="count">0</h2></div>
<div class="card">Admins<h2>1</h2></div>
<div class="card">Visits<h2 id="visits">0</h2></div>
</div>

<div class="section">
<div id="list"></div>
</div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<input id="name" placeholder="Branch Name">
<input id="manager" placeholder="Manager Name">
<input id="phone" placeholder="Manager Phone">
<input id="location" placeholder="Location URL">
<input id="workingHours" placeholder="Working Hours">

<div id="empBox">
<h4>Employees</h4>
</div>

<button onclick="addEmp()" style="margin:10px 0;">+ Add Employee</button>

<button class="save" onclick="save()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, deleteDoc, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let branches = [];
let editId = null;
let empCount = 0;

/* LOAD */
async function load(){

const snap = await getDocs(collection(db,"branches"));

branches = [];
snap.forEach(d=>{
branches.push({id:d.id,...d.data()});
});

document.getElementById("count").innerText = branches.length;

render(branches);
}

/* RENDER */
function render(data){

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(b=>{

list.innerHTML += `
<div class="branch">

<div>
<strong>${b.name}</strong><br>
<small>${b.manager}</small>
</div>

<div class="actions">
<button class="edit" onclick="edit('${b.id}')">Edit</button>
<button class="delete" onclick="del('${b.id}')">Delete</button>
</div>

</div>
`;
});

}

/* SEARCH */
document.getElementById("search").oninput = (e)=>{
const v = e.target.value.toLowerCase();
render(branches.filter(b=>b.name.toLowerCase().includes(v)));
}

/* MODAL */
window.openModal = ()=>{
editId=null;
document.getElementById("modal").style.display="flex";
}

/* ADD EMP */
window.addEmp = ()=>{
const box = document.getElementById("empBox");

box.innerHTML += `
<input class="emp-input" placeholder="Employee Name" id="emp_name_${empCount}">
<input class="emp-input" placeholder="Employee Phone" id="emp_phone_${empCount}">
`;

empCount++;
}

/* SAVE */
window.save = async ()=>{

let employees=[];

for(let i=0;i<empCount;i++){
let n=document.getElementById(`emp_name_${i}`)?.value;
let p=document.getElementById(`emp_phone_${i}`)?.value;
if(n&&p) employees.push({name:n,phone:p});
}

const data={
name:document.getElementById("name").value,
manager:document.getElementById("manager").value,
phone:document.getElementById("phone").value,
location:document.getElementById("location").value,
workingHours:document.getElementById("workingHours").value,
employees
};

if(editId){
await updateDoc(doc(db,"branches",editId),data);
}else{
await addDoc(collection(db,"branches"),data);
}

closeModal();
load();
}

/* EDIT */
window.edit = (id)=>{
const b=branches.find(x=>x.id===id);
editId=id;

document.getElementById("name").value=b.name||"";
document.getElementById("manager").value=b.manager||"";
document.getElementById("phone").value=b.phone||"";
document.getElementById("location").value=b.location||"";
document.getElementById("workingHours").value=b.workingHours||"";

document.getElementById("empBox").innerHTML="<h4>Employees</h4>";
empCount=0;

(b.employees||[]).forEach(e=>{
addEmp();
document.getElementById(`emp_name_${empCount-1}`).value=e.name;
document.getElementById(`emp_phone_${empCount-1}`).value=e.phone;
});

document.getElementById("modal").style.display="flex";
}

/* DELETE */
window.del = async (id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

window.closeModal=closeModal;

load();

</script>

</body>
</html>
