<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- نظام تسجيل الدخول -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
            authDomain: "breadfast-coffee.firebaseapp.com",
            projectId: "breadfast-coffee",
            storageBucket: "breadfast-coffee.firebasestorage.app",
            messagingSenderId: "803906042715",
            appId: "1:803906042715:web:1e8977716adc54947b787e"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // مراقبة حالة الدخول
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                document.getElementById('login-modal').classList.remove('hidden');
            }
        });

        window.login = async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                document.getElementById('login-modal').classList.add('hidden');
            } catch(e) {
                alert("خطأ في بيانات الدخول");
            }
        }
    </script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- مودال تسجيل الدخول -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center">
            <h2 class="text-xl font-bold mb-4">تسجيل الدخول للإدارة</h2>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني" class="w-full border p-2 mb-2 rounded">
            <input type="password" id="login-pass" placeholder="كلمة المرور" class="w-full border p-2 mb-4 rounded">
            <button onclick="window.login()" class="bg-blue-600 text-white w-full py-2 rounded">دخول</button>
        </div>
    </div>

    <!-- المحتوى الخاص بك بالكامل -->
    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="h-16 flex items-center justify-center bg-slate-950 font-bold text-xl tracking-wide border-b border-slate-800">
                <i class="fa-solid mt-1 ml-2 fa-mug-hot text-amber-500"></i> FPs Coffee
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="#" class="flex items-center px-4 py-2.5 bg-blue-600 text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-house ml-3 w-5"></i> الرئيسية
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-users ml-3 w-5"></i> المستخدمين
                </a>
            </nav>
            <div class="p-4 border-t border-slate-800 text-sm text-slate-500 text-center">إصدار النظام 1.0</div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto overflow-x-hidden">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
                <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 w-64">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 ml-2"></i>
                    <input type="text" id="adminSearch" placeholder="بحث سريع في الفروع..." onkeyup="window.searchAdminBranches()" class="bg-transparent focus:outline-none text-sm w-full">
                </div>
                <div class="flex items-center space-x-4 space-x-reverse">
                    <span class="text-sm font-medium text-gray-700 ml-2">مدير النظام</span>
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">M</div>
                </div>
            </header>

            <main class="p-6 space-y-6 flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div class="text-right">
                            <p class="text-sm text-gray-400 font-medium">إجمالي عدد الفروع</p>
                            <h3 id="firebase-branches-count" class="text-3xl font-bold text-gray-800 mt-1">جاري التحميل...</h3>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div class="text-right">
                            <p class="text-sm text-gray-400 font-medium">إجمالي عدد الزيارات</p>
                            <h3 id="total-visits-count" class="text-3xl font-bold text-gray-800 mt-1">0</h3>
                        </div>
                    </div>
                </div>
                <div id="branches-list-container" class="space-y-3"></div>
            </main>
        </div>
    </div>

    <!-- باقي الكود الخاص بالـ Modal والـ Script الخاص بك كما هو -->
    <script type="module">
        // ... نفس الكود الخاص بك بالضبط للتعامل مع الفروع ...
    </script>
</body>
</html>
