<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPs Dashboard Clean Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f6fb;
}

/* APP */
.app{
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;
background:#0f172a;
color:#fff;
height:100vh;
position:fixed;
right:0;
top:0;
padding:20px;
}

.logo{
font-weight:bold;
margin-bottom:20px;
}

.menu{
padding:10px;
border-radius:10px;
color:#cbd5e1;
cursor:pointer;
margin-bottom:6px;
}

.menu:hover{
background:#1e293b;
}

/* MAIN */
.main{
margin-right:240px;
padding:25px;
width:100%;
}

/* TOP */
.topbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:10px;
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ddd;
width:260px;
outline:none;
}

button{
border:none;
cursor:pointer;
padding:10px 14px;
border-radius:10px;
background:#4f46e5;
color:#fff;
}

/* STATS */
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.stat{
background:#fff;
padding:15px;
border-radius:14px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.stat h2{
color:#4f46e5;
}

/* CARD */
.card{
background:#fff;
padding:16px;
border-radius:14px;
margin-top:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.title{
font-size:16px;
font-weight:bold;
}

.small{
font-size:13px;
color:#6b7280;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

/* LINKS */
a{
color:#4f46e5;
text-decoration:none;
}

/* EMP */
.emp{
margin-top:10px;
padding-top:10px;
border-top:1px solid #eee;
}

.emp-item{
font-size:13px;
margin-top:5px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.box{
background:#fff;
padding:20px;
width:380px;
border-radius:14px;
max-height:90vh;
overflow:auto;
position:relative;
}

/* CLOSE BUTTON */
.close{
position:absolute;
top:10px;
left:10px;
background:#ef4444;
color:#fff;
width:28px;
height:28px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
font-weight:bold;
}

.box input{
width:100%;
margin-bottom:8px;
}

.save{
width:100%;
background:#4f46e5;
color:#fff;
padding:12px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">☕ FPs System</div>
<div class="menu">Dashboard</div>
<div class="menu">Branches</div>
</div>

<div class="main">

<div class="topbar">
<input id="search" placeholder="Search branches">
<button onclick="openModal()">+ Add Branch</button>
</div>

<div class="stats">
<div class="stat">Branches <h2 id="bCount">0</h2></div>
<div class="stat">Employees <h2 id="eCount">0</h2></div>
</div>

<div id="list"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="backdropClose(event)">
<div class="box">

<div class="close" onclick="closeModal()">×</div>

<input id="name" placeholder="Branch Name">
<input id="manager" placeholder="Manager Name">
<input id="managerPhone" placeholder="Manager Phone">
<input id="location" placeholder="Google Maps Link">
<input id="hours" placeholder="Working Hours">

<h4>Employees</h4>
<div id="empBox"></div>
<button onclick="addEmp()">+ Add Employee</button>

<br><br>

<button class="save" onclick="save()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee"
});

const db = getFirestore(app);

let branches=[];
let editId=null;
let employees=[];

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"branches"));
branches=[];
snap.forEach(d=>branches.push({id:d.id,...d.data()}));

render();
}

/* RENDER */
function render(){
const box=document.getElementById("list");
box.innerHTML="";

let totalEmp=0;

branches.forEach(b=>{
totalEmp += (b.employees?.length||0);

box.innerHTML+=`
<div class="card">

<div class="row">
<div>
<div class="title">${b.name}</div>
<div class="small">${b.hours||""}</div>
</div>

<div>
<button onclick="edit('${b.id}')">Edit</button>
<button onclick="del('${b.id}')">Delete</button>
</div>
</div>

<br>

<div class="small">
📍 <a href="${b.location}" target="_blank">Open Map</a>
</div>

<div class="small">
👤 ${b.manager} |
📞 <a href="tel:${b.managerPhone}">Call</a> |
💬 <a href="https://wa.me/${b.managerPhone}" target="_blank">WhatsApp</a>
</div>

<div class="emp">

<b>Employees</b>

${(b.employees||[]).map(e=>`
<div class="emp-item">
👤 ${e.name} |
📞 <a href="tel:${e.phone}">Call</a> |
💬 <a href="https://wa.me/${e.phone}" target="_blank">WhatsApp</a>
</div>
`).join("")}

</div>

</div>
`;
});

document.getElementById("bCount").innerText=branches.length;
document.getElementById("eCount").innerText=totalEmp;
}

/* SEARCH */
document.getElementById("search").oninput=(e)=>{
let v=e.target.value.toLowerCase();
render(branches.filter(b=>b.name.toLowerCase().includes(v)));
}

/* OPEN */
window.openModal=()=>{
editId=null;
employees=[];
drawEmp();
document.getElementById("modal").style.display="flex";
}

/* CLOSE */
window.closeModal=()=>{
document.getElementById("modal").style.display="none";
}

/* BACKDROP CLOSE */
window.backdropClose=(e)=>{
if(e.target.id==="modal") closeModal();
}

/* EMP */
window.addEmp=()=>{
employees.push({name:"",phone:""});
drawEmp();
}

function drawEmp(){
const box=document.getElementById("empBox");
box.innerHTML="";

employees.forEach((e,i)=>{
box.innerHTML+=`
<input placeholder="Employee Name" oninput="employees[${i}].name=this.value">
<input placeholder="Employee Phone" oninput="employees[${i}].phone=this.value">
`;
});
}

/* SAVE */
window.save=async()=>{

const data={
name:document.getElementById("name").value,
manager:document.getElementById("manager").value,
managerPhone:document.getElementById("managerPhone").value,
location:document.getElementById("location").value,
hours:document.getElementById("hours").value,
employees:[...employees]
};

if(editId){
await updateDoc(doc(db,"branches",editId),data);
}else{
await addDoc(collection(db,"branches"),data);
}

closeModal();
load();
}

/* EDIT */
window.edit=(id)=>{
const b=branches.find(x=>x.id===id);
editId=id;

document.getElementById("name").value=b.name||"";
document.getElementById("manager").value=b.manager||"";
document.getElementById("managerPhone").value=b.managerPhone||"";
document.getElementById("location").value=b.location||"";
document.getElementById("hours").value=b.hours||"";

employees=[...(b.employees||[])];
drawEmp();

document.getElementById("modal").style.display="flex";
}

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

load();

</script>

</body>
</html>
