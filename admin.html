<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

.box{
    width:350px;
    margin:100px auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

.dashboard{
    display:none;
    width:90%;
    margin:40px auto;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<h2>Add Branch</h2>

<input id="nameEn" placeholder="Name EN">
<input id="nameAr" placeholder="Name AR">
<input id="map" placeholder="Google Map Link">

<button onclick="addBranch()">Add Branch</button>

<table>
<thead>
<tr>
<th>EN</th>
<th>AR</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
  authDomain: "breadfast-coffee.firebaseapp.com",
  projectId: "breadfast-coffee",
  storageBucket: "breadfast-coffee.firebasestorage.app",
  messagingSenderId: "803906042715",
  appId: "1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let isLogged = false;

function showDashboard(){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
}

// ================= LOGIN =================
window.login = function(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234"){
        isLogged = true;
        showDashboard();
        loadBranches(); // 🔥 مهم
    }else{
        alert("Wrong login");
    }
};

// ================= ADD =================
window.addBranch = async function(){

    await addDoc(collection(db, "branches"), {
        name: document.getElementById("nameEn").value,
        nameAr: document.getElementById("nameAr").value,
        map: document.getElementById("map").value
    });

    loadBranches();
};

// ================= LOAD =================
window.loadBranches = async function(){

    const snapshot = await getDocs(collection(db, "branches"));

    let table = document.getElementById("table");
    table.innerHTML = "";

    snapshot.forEach((d) => {

        let b = d.data();

        table.innerHTML += `
        <tr>
            <td>${b.name}</td>
            <td>${b.nameAr}</td>
            <td>
                <button onclick="deleteBranch('${d.id}')">Delete</button>
            </td>
        </tr>
        `;
    });
};

// ================= DELETE =================
window.deleteBranch = async function(id){

    await deleteDoc(doc(db, "branches", id));

    loadBranches();
};

// 🔥 تحميل تلقائي بعد ما الصفحة تفتح (لو حد داخل ومش عامل refresh بعد login)
window.onload = function(){
    console.log("Admin page ready");
};

</script>

</body>
</html>
