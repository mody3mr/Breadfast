<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
            <i class="fa-solid fa-lock"></i>
        </div>

        <h2 class="text-2xl font-bold text-gray-800 mb-2">تسجيل دخول الإدارة</h2>
        <p class="text-sm text-gray-500 mb-6">يرجى إدخال حساب Auth الـ Firebase للوصول للوحة</p>

        <form id="loginForm" class="space-y-4 text-right">
            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">البريد الإلكتروني</label>
                <div class="relative">
                    <input type="email" id="email" required placeholder="name@example.com"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10 text-left" dir="ltr">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-envelope"></i>
                    </span>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 pr-10 text-left" dir="ltr">
                    <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                        <i class="fa-solid fa-key"></i>
                    </span>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-200 flex items-center justify-center gap-2">
                <span id="btnText">دخول النظام</span>
                <i class="fa-solid fa-arrow-right-to-bracket rotate-180"></i>
            </button>
        </form>
    </div>

    <script>
        // 1. تنظيف الرابط فوراً إذا كان ينتهي بعلامة استفهام معلقة لمنع تجميد Firebase
        if (window.location.href.endsWith('?')) {
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + window.location.hash;
            window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        }

        // 2. معالجة الفرم عند الضغط على زر الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // منع السلوك الافتراضي للمتصفح تماماً لمنع إعادة تحميل الصفحة أو إضافة "?" جديدة
            e.preventDefault(); 

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            // تغيير شكل الزر لشكل التحميل لمنع الضغط المزدوج
            submitBtn.disabled = true;
            btnText.innerText = "جاري التحقق...";

            console.log("جاري محاولة تسجيل الدخول للمستخدم:", email);

            /* 3. هنا يتم ربط كود Firebase Auth الخاص بك
               مثال افتراضي مستقر لـ Firebase:
               
               firebase.auth().signInWithEmailAndPassword(email, password)
               .then((userCredential) => {
                   // تسجيل الدخول نجح، التوجيه للوحة التحكم مع الهاش #
                   window.location.href = "admin.html#"; 
               })
               .catch((error) => {
                   // فشل تسجيل الدخول، إعادة الزر لطبيعته وعرض الخطأ
                   alert("خطأ في تسجيل الدخول: " + error.message);
                   submitBtn.disabled = false;
                   btnText.innerText = "دخول النظام";
               });
            */

            // محاكاة مؤقتة للتوجيه (احذف هذا الجزء بمجرد تفعيل كود Firebase الخاص بك أعلاه)
            setTimeout(() => {
                // التوجيه للوحة المفاتيح مباشرة عبر الهاش كما في لقطات الشاشة عندك
                window.location.href = "admin.html#"; 
            }, 1000);
        });
    </script>
</body>
</html>
