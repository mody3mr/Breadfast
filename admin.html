<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
}

/* LOGIN */
#loginBox{
    width:300px;
    margin:100px auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* APP */
#app{
    display:none;
    width:100%;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111827;
    min-height:100vh;
    padding:20px;
}

.sidebar button{
    background:#1f2937;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

.page{ display:none; }
.active{ display:block; }

/* CARDS */
.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

td,th{
    padding:10px;
    border-bottom:1px solid #334155;
}

.delete{
    background:#ef4444;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<!-- SIDEBAR -->
<div class="sidebar">
<h3>Admin</h3>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('branches')">Branches</button>
<button onclick="showPage('users')">Users</button>
<button onclick="showPage('settings')">Settings</button>

<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
<h2>Dashboard</h2>

<div class="card">
<h2 id="totalBranches">0</h2>
<p>Total Branches</p>
</div>

</div>

<!-- BRANCHES -->
<div id="branches" class="page">

<h2>Branches</h2>

<div class="card">

<input id="nameEn" placeholder="Name EN">
<input id="nameAr" placeholder="Name AR">
<input id="map" placeholder="Map Link">
<input id="manager" placeholder="Manager">
<input id="phone" placeholder="Phone">
<input id="team" placeholder="Team (comma)">

<button onclick="addBranch()">Add Branch</button>

</div>

<table>
<thead>
<tr>
<th>EN</th>
<th>AR</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<!-- USERS -->
<div id="users" class="page">
<h2>Users (future)</h2>
<p>Coming soon...</p>
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
<h2>Settings</h2>
<button onclick="toggleDark()">Dark Mode</button>
</div>

</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
  authDomain: "breadfast-coffee.firebaseapp.com",
  projectId: "breadfast-coffee",
  storageBucket: "breadfast-coffee.firebasestorage.app",
  messagingSenderId: "803906042715",
  appId: "1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let branches = [];

/* ================= LOGIN ================= */
window.login = function(){

    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    signInWithEmailAndPassword(auth,email,pass)
    .catch(()=>alert("Wrong login"));
};

window.logout = function(){
    signOut(auth);
};

/* ================= AUTH STATE ================= */
onAuthStateChanged(auth,(user)=>{

    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="flex";
    }else{
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

/* ================= REALTIME ================= */
onSnapshot(collection(db,"branches"),(snap)=>{

    branches = [];

    snap.forEach(d=>{
        branches.push({id:d.id,...d.data()});
    });

    document.getElementById("totalBranches").innerText = branches.length;

    render();
});

/* ================= ADD ================= */
window.addBranch = async function(){

    await addDoc(collection(db,"branches"),{
        name:nameEn.value,
        nameAr:nameAr.value,
        map:map.value,
        manager:manager.value,
        phone:phone.value,
        team:team.value
    });

};

/* ================= DELETE ================= */
window.deleteBranch = async function(id){

    await deleteDoc(doc(db,"branches",id));
};

/* ================= RENDER ================= */
function render(){

    let table = document.getElementById("table");
    table.innerHTML="";

    branches.forEach(b=>{

        table.innerHTML += `
        <tr>
            <td>${b.name}</td>
            <td>${b.nameAr}</td>
            <td>
                <button class="delete" onclick="deleteBranch('${b.id}')">Delete</button>
            </td>
        </tr>
        `;
    });
}

/* ================= NAV ================= */
window.showPage = function(page){

    document.querySelectorAll(".page").forEach(p=>{
        p.classList.remove("active");
    });

    document.getElementById(page).classList.add("active");
};

/* ================= SETTINGS ================= */
window.toggleDark = function(){
    document.body.classList.toggle("dark");
};

</script>

</body>
</html>
