<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPs Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f6f7fb;
    color:#111827;
}

/* APP LAYOUT */
.app{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#0f172a;
    color:white;
    position:fixed;
    right:0;
    top:0;
    bottom:0;
    padding:20px;
}

.logo{
    font-weight:bold;
    font-size:18px;
    margin-bottom:25px;
}

.menu{
    padding:10px;
    border-radius:8px;
    margin-bottom:6px;
    color:#cbd5e1;
    cursor:pointer;
    transition:0.2s;
}

.menu:hover{
    background:#1e293b;
    color:white;
}

/* MAIN */
.main{
    margin-right:240px;
    width:100%;
    padding:30px;
}

/* HEADER */
.header h1{
    font-size:22px;
    margin-bottom:5px;
}

.header p{
    color:#6b7280;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 1px 8px rgba(0,0,0,0.06);
}

.card h2{
    margin-top:10px;
    color:#6366f1;
}

/* SECTION */
.section{
    margin-top:30px;
}

.section h3{
    margin-bottom:12px;
}

/* BRANCH ITEM */
.branch{
    background:white;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 1px 6px rgba(0,0,0,0.05);
}

.branch small{
    color:#6b7280;
}

/* BUTTONS */
.actions button{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}

.edit{
    background:#3b82f6;
    color:white;
    margin-left:5px;
}

.delete{
    background:#ef4444;
    color:white;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">☕ FPs Admin</div>

<div class="menu">Dashboard</div>
<div class="menu">Branches</div>
<div class="menu">Users</div>
<div class="menu">Settings</div>
<div class="menu">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Dashboard Overview</h1>
<p>Manage branches, users and system data</p>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
Branches
<h2 id="branchesCount">0</h2>
</div>

<div class="card">
Admins
<h2>1</h2>
</div>

<div class="card">
Visits
<h2>0</h2>
</div>

</div>

<!-- BRANCH LIST -->
<div class="section">
<h3>Branches</h3>
<div id="branchesList"></div>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD DATA */
async function load(){

const snap = await getDocs(collection(db,"branches"));

document.getElementById("branchesCount").innerText = snap.size;

const list = document.getElementById("branchesList");
list.innerHTML = "";

snap.forEach(d=>{

const b = d.data();

list.innerHTML += `
<div class="branch">

<div>
<strong>${b.nameAr || b.name}</strong><br>
<small>${b.managerName || ""}</small>
</div>

<div class="actions">
<button class="edit">Edit</button>
<button class="delete" onclick="del('${d.id}')">Delete</button>
</div>

</div>
`;
});

}

/* DELETE */
window.del = async function(id){
await deleteDoc(doc(db,"branches",id));
load();
}

load();

</script>

</body>
</html>
