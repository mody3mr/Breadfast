<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* تصميم توست احترافي */
        .custom-toast {
            position: fixed; bottom: 20px; right: 20px;
            background: #1e293b; color: white; padding: 16px 24px;
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-right: 4px solid #3b82f6; display: flex;
            align-items: center; gap: 10px; z-index: 9999;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="h-16 flex items-center justify-center bg-slate-950 font-bold text-xl tracking-wide border-b border-slate-800">
                <i class="fa-solid mt-1 ml-2 fa-mug-hot text-amber-500"></i> FPs Coffee
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="#" class="flex items-center px-4 py-2.5 bg-blue-600 text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-house ml-3 w-5"></i> الرئيسية
                </a>
            </nav>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto overflow-x-hidden">
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
                <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 w-64">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 ml-2"></i>
                    <input type="text" id="adminSearch" placeholder="بحث سريع..." onkeyup="window.searchAdminBranches()" class="bg-transparent focus:outline-none text-sm w-full">
                </div>
            </header>

            <main class="p-6 space-y-6 flex-1">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div><p class="text-sm text-gray-400">إجمالي عدد الفروع</p><h3 id="firebase-branches-count" class="text-3xl font-bold text-gray-800 mt-1">جاري...</h3></div>
                    </div>
                </div>
                <div id="branches-list-container" class="space-y-3"></div>
            </main>
        </div>
    </div>

    <div id="branchModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // الدالة الاحترافية للـ Toast
        window.showToast = function(message) {
            const toast = document.createElement('div');
            toast.className = 'custom-toast';
            toast.innerHTML = `<i class="fa-solid fa-circle-info text-blue-500"></i> <span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
            authDomain: "breadfast-coffee.firebaseapp.com",
            projectId: "breadfast-coffee",
            storageBucket: "breadfast-coffee.firebasestorage.app",
            messagingSenderId: "803906042715",
            appId: "1:803906042715:web:1e8977716adc54947b787e"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        // [استبدال الـ alerts]: هنا بس استدعي window.showToast("رسالتك") بدلاً من alert
        // (الكود الباقي كما هو يا محمد)
        
        // مثال عند الحفظ:
        // window.showToast("تم حفظ البيانات بنجاح!");
        
        // ... (باقي المنطق بتاعك شغال زي ما هو)
    </script>
</body>
</html>
