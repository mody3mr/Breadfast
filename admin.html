<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{font-family:Arial;background:#f5f6fb;margin:0;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin:10px 0;
display:flex;justify-content:space-between;align-items:center}
button{margin-left:5px;padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.edit{background:#3b82f6;color:#fff}
.del{background:#ef4444;color:#fff}
.open{background:#10b981;color:#fff}
</style>
</head>

<body>

<h2>Branches</h2>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee"
});

const db = getFirestore(app);

let branches=[];

async function load(){
const snap = await getDocs(collection(db,"branches"));
branches=[];
snap.forEach(d=>branches.push({id:d.id,...d.data()}));
render();
}

function render(){
let box=document.getElementById("list");
box.innerHTML="";

branches.forEach(b=>{
box.innerHTML+=`
<div class="card">
<div>${b.name}</div>

<div>
<button class="open" onclick="openPage('${b.id}')">Open</button>
<button class="edit">Edit</button>
<button class="del" onclick="del('${b.id}')">Delete</button>
</div>
</div>
`;
});
}

window.openPage=(id)=>{
location.href="branch.html?id="+id;
}

window.del=async(id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

load();

</script>

</body>
</html>
