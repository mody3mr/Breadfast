<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPs Dashboard Fixed</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{background:#f6f7fb}

/* layout */
.app{display:flex;min-height:100vh}

.sidebar{
width:240px;background:#0f172a;color:#fff;position:fixed;right:0;top:0;bottom:0;padding:20px;
}

.menu{padding:10px;color:#cbd5e1;margin-bottom:6px;border-radius:8px}
.menu:hover{background:#1e293b}

.main{margin-right:240px;padding:25px;width:100%}

/* top */
.topbar{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.search{padding:10px;width:250px;border:1px solid #ddd;border-radius:8px}
.add-btn{background:#6366f1;color:#fff;border:none;padding:10px 14px;border-radius:8px}

/* list */
.branch{
background:#fff;padding:14px;border-radius:10px;margin-bottom:10px;
display:flex;justify-content:space-between;align-items:center;
}

.actions button{margin-left:5px;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
.edit{background:#3b82f6;color:#fff}
.delete{background:#ef4444;color:#fff}

/* modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);justify-content:center;align-items:center}
.box{background:#fff;padding:20px;border-radius:12px;width:350px;max-height:90vh;overflow:auto}

input{width:100%;padding:10px;margin-bottom:8px;border:1px solid #ddd;border-radius:8px}

.save{width:100%;background:#6366f1;color:#fff;border:none;padding:10px;border-radius:8px}

.emp{margin-top:10px}
.emp input{margin-top:5px}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="menu">Dashboard</div>
<div class="menu">Branches</div>
</div>

<div class="main">

<div class="topbar">
<input id="search" class="search" placeholder="Search">
<button class="add-btn" onclick="openModal()">+ Add Branch</button>
</div>

<div id="list"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<input id="name" placeholder="Branch Name">
<input id="manager" placeholder="Manager Name">
<input id="phone" placeholder="Manager Phone">
<input id="location" placeholder="Location">
<input id="hours" placeholder="Working Hours">

<div class="emp">
<h4>Employees</h4>
<div id="empBox"></div>
<button onclick="addEmp()">+ Add Employee</button>
</div>

<button class="save" onclick="save()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
});

const db = getFirestore(app);

let branches=[];
let editId=null;
let emp=[];

/* LOAD */
async function load(){
const snap = await getDocs(collection(db,"branches"));

branches=[];
snap.forEach(d=>branches.push({id:d.id,...d.data()}));

render(branches);
}

function render(list){
const box=document.getElementById("list");
box.innerHTML="";

list.forEach(b=>{
box.innerHTML+=`
<div class="branch">
<div>
<strong>${b.name}</strong><br>
<small>${b.manager}</small>
</div>

<div>
<button class="edit" onclick="edit('${b.id}')">Edit</button>
<button class="delete" onclick="del('${b.id}')">X</button>
</div>
</div>
`;
});
}

/* SEARCH */
document.getElementById("search").oninput=(e)=>{
let v=e.target.value.toLowerCase();
render(branches.filter(b=>b.name.toLowerCase().includes(v)));
}

/* MODAL */
window.openModal=()=>{
editId=null;
emp=[];
document.getElementById("empBox").innerHTML="";
document.getElementById("modal").style.display="flex";
}

/* EMP */
window.addEmp=()=>{
emp.push({name:"",phone:""});

drawEmp();
}

function drawEmp(){
const box=document.getElementById("empBox");
box.innerHTML="";

emp.forEach((e,i)=>{
box.innerHTML+=`
<input placeholder="Employee Name" oninput="emp[${i}].name=this.value">
<input placeholder="Employee Phone" oninput="emp[${i}].phone=this.value">
<hr>
`;
});
}

/* SAVE */
window.save=async()=>{

const data={
name:document.getElementById("name").value,
manager:document.getElementById("manager").value,
phone:document.getElementById("phone").value,
location:document.getElementById("location").value,
hours:document.getElementById("hours").value,
employees:emp
};

if(editId){
await updateDoc(doc(db,"branches",editId),data);
}else{
await addDoc(collection(db,"branches"),data);
}

close();
load();
}

/* EDIT FIXED */
window.edit=(id)=>{
const b=branches.find(x=>x.id===id);
editId=id;

document.getElementById("name").value=b.name||"";
document.getElementById("manager").value=b.manager||"";
document.getElementById("phone").value=b.phone||"";
document.getElementById("location").value=b.location||"";
document.getElementById("hours").value=b.hours||"";

emp = b.employees ? [...b.employees] : [];

drawEmp();

document.getElementById("modal").style.display="flex";
}

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

function close(){
document.getElementById("modal").style.display="none";
}

load();

</script>

</body>
</html>
