<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0b1220;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#111827;
    padding:20px;
    color:white;
    position:fixed;
    right:0;
}

.logo{
    font-size:20px;
    font-weight:bold;
    margin-bottom:25px;
}

.menu{
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
    color:#cbd5e1;
    transition:0.2s;
}

.menu:hover{
    background:#1f2937;
    color:white;
}

/* MAIN */
.main{
    margin-right:250px;
    padding:25px;
    width:100%;
}

/* HEADER */
.header{
    color:white;
    margin-bottom:20px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:15px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.card h2{
    margin:10px 0 0;
    color:#7c3aed;
}

/* BRANCHES */
.section{
    margin-top:25px;
}

.branch{
    background:#111827;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.actions button{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-left:5px;
}

.edit{background:#3b82f6;color:white;}
.delete{background:#ef4444;color:white;}

/* MOBILE */
@media(max-width:768px){

.sidebar{
    position:relative;
    width:100%;
    height:auto;
}

.main{
    margin-right:0;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">☕ FPs Admin</div>

<div class="menu">📊 Dashboard</div>
<div class="menu">📍 Branches</div>
<div class="menu">👥 Users</div>
<div class="menu">⚙ Settings</div>
<div class="menu">🚪 Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Dashboard Overview 👋</h1>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card">
Branches
<h2 id="branchesCount">0</h2>
</div>

<div class="card">
Admins
<h2>1</h2>
</div>

<div class="card">
Visits
<h2>0</h2>
</div>

</div>

<!-- BRANCHES LIST -->
<div class="section">
<h2 style="color:white;">Branches List</h2>

<div id="branchesList"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOAD BRANCHES */
async function loadBranches(){

const snap = await getDocs(collection(db,"branches"));

document.getElementById("branchesCount").innerText = snap.size;

const list = document.getElementById("branchesList");
list.innerHTML = "";

snap.forEach(d=>{

const b = d.data();

list.innerHTML += `
<div class="branch">

<div>
<strong>${b.nameAr || b.name}</strong><br>
<small>${b.managerName || ""}</small>
</div>

<div class="actions">
<button class="edit">Edit</button>
<button class="delete" onclick="deleteBranch('${d.id}')">Delete</button>
</div>

</div>
`;
});

}

/* DELETE */
window.deleteBranch = async function(id){
await deleteDoc(doc(db,"branches",id));
loadBranches();
}

/* LOGOUT */
window.logout = function(){
signOut(auth);
location.reload();
}

loadBranches();

</script>

</body>
</html>
