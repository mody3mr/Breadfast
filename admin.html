<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPs SaaS Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f6f7fb;
}

/* LAYOUT */
.app{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:240px;
    background:#0f172a;
    color:white;
    position:fixed;
    right:0;
    top:0;
    bottom:0;
    padding:20px;
}

.logo{
    font-weight:bold;
    margin-bottom:20px;
}

.menu{
    padding:10px;
    margin-bottom:6px;
    border-radius:8px;
    color:#cbd5e1;
    cursor:pointer;
}

.menu:hover{
    background:#1e293b;
}

/* MAIN */
.main{
    margin-right:240px;
    width:100%;
    padding:25px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

.search{
    padding:10px;
    width:250px;
    border:1px solid #ddd;
    border-radius:8px;
}

.add-btn{
    background:#6366f1;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:10px;
}

.card{
    background:white;
    padding:18px;
    border-radius:12px;
    box-shadow:0 1px 6px rgba(0,0,0,0.06);
}

.card h2{
    color:#6366f1;
    margin-top:8px;
}

/* LIST */
.section{
    margin-top:25px;
}

.branch{
    background:white;
    padding:14px;
    border-radius:10px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.branch small{
    color:#6b7280;
}

/* ACTIONS */
.actions button{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}

.edit{background:#3b82f6;color:white;margin-left:5px;}
.delete{background:#ef4444;color:white;}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:white;
    padding:20px;
    border-radius:12px;
    width:320px;
}

.modal-box input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.save{
    background:#6366f1;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:8px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">☕ FPs Admin</div>
<div class="menu">Dashboard</div>
<div class="menu">Branches</div>
<div class="menu">Analytics</div>
<div class="menu">Settings</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">
<input class="search" id="search" placeholder="Search branches...">
<button class="add-btn" onclick="openModal()">+ Add Branch</button>
</div>

<!-- STATS -->
<div class="cards">
<div class="card">Branches<h2 id="count">0</h2></div>
<div class="card">Visits<h2 id="visits">0</h2></div>
<div class="card">Admins<h2>1</h2></div>
</div>

<!-- LIST -->
<div class="section">
<div id="list"></div>
</div>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h3 id="modalTitle">Add Branch</h3>

<input id="name" placeholder="Branch Name">
<input id="manager" placeholder="Manager Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location URL">

<button class="save" onclick="save()">Save</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, deleteDoc, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let branches = [];
let editId = null;

/* LOAD */
async function load(){

const snap = await getDocs(collection(db,"branches"));

branches = [];
snap.forEach(d=>{
branches.push({id:d.id,...d.data()});
});

document.getElementById("count").innerText = branches.length;

render(branches);
}

/* RENDER */
function render(data){

const list = document.getElementById("list");
list.innerHTML = "";

data.forEach(b=>{

list.innerHTML += `
<div class="branch">

<div>
<strong>${b.name || ""}</strong><br>
<small>${b.manager || ""}</small>
</div>

<div class="actions">
<button class="edit" onclick="edit('${b.id}')">Edit</button>
<button class="delete" onclick="del('${b.id}')">Delete</button>
</div>

</div>
`;
});

}

/* SEARCH */
document.getElementById("search").oninput = (e)=>{
const val = e.target.value.toLowerCase();
render(branches.filter(b=>b.name.toLowerCase().includes(val)));
}

/* MODAL */
window.openModal = ()=>{
editId = null;
document.getElementById("modal").style.display="flex";
}

window.save = async ()=>{

const data = {
name:document.getElementById("name").value,
manager:document.getElementById("manager").value,
phone:document.getElementById("phone").value,
location:document.getElementById("location").value
};

if(editId){
await updateDoc(doc(db,"branches",editId),data);
}else{
await addDoc(collection(db,"branches"),data);
}

closeModal();
load();
}

window.edit = (id)=>{
const b = branches.find(x=>x.id===id);
editId = id;

document.getElementById("name").value = b.name;
document.getElementById("manager").value = b.manager;
document.getElementById("phone").value = b.phone;
document.getElementById("location").value = b.location;

document.getElementById("modal").style.display="flex";
}

window.del = async (id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

/* CLOSE */
function closeModal(){
document.getElementById("modal").style.display="none";
}

window.closeModal = closeModal;

load();

</script>

</body>
</html>
