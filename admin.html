<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clean Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f6f7fb}

/* layout */
.app{display:flex;min-height:100vh}

.sidebar{
width:240px;background:#0f172a;color:#fff;
position:fixed;right:0;top:0;bottom:0;padding:20px;
}

.main{
margin-right:240px;
padding:25px;
width:100%;
}

/* list */
.item{
background:#fff;padding:14px;border-radius:10px;
margin-bottom:10px;
display:flex;justify-content:space-between;
}

/* modal */
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,0.5);
justify-content:center;align-items:center;
}

.box{
background:#fff;padding:20px;border-radius:12px;
width:360px;
}

input{
width:100%;padding:10px;margin-bottom:8px;
border:1px solid #ddd;border-radius:8px;
}

.emp{
margin-top:10px;
}

.emp-item{
margin-bottom:10px;
}

button{
cursor:pointer;
}

.save{
width:100%;
padding:10px;
background:#6366f1;
color:#fff;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<h3>Dashboard</h3>
</div>

<div class="main">

<button onclick="openModal()">+ Add Branch</button>

<div id="list"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<input id="name" placeholder="Branch Name">
<input id="manager" placeholder="Manager Name">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="hours" placeholder="Working Hours">

<div class="emp">
<h4>Employees</h4>
<div id="empBox"></div>
<button onclick="addEmp()">+ Add Employee</button>
</div>

<button class="save" onclick="save()">Save</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, getDocs,
addDoc, updateDoc, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee"
});

const db = getFirestore(app);

/* GLOBAL STATE */
let branches=[];
let editId=null;
let employees=[];

/* LOAD */
async function load(){
const snap=await getDocs(collection(db,"branches"));

branches=[];
snap.forEach(d=>branches.push({id:d.id,...d.data()}));

render();
}

/* RENDER */
function render(){
const box=document.getElementById("list");
box.innerHTML="";

branches.forEach(b=>{
box.innerHTML+=`
<div class="item">
<div>
<strong>${b.name}</strong><br>
<small>${b.manager}</small>
</div>

<div>
<button onclick="edit('${b.id}')">Edit</button>
<button onclick="del('${b.id}')">Delete</button>
</div>
</div>
`;
});
}

/* RESET FORM */
function resetForm(){
document.getElementById("name").value="";
document.getElementById("manager").value="";
document.getElementById("phone").value="";
document.getElementById("location").value="";
document.getElementById("hours").value="";

employees=[];
renderEmployees();
}

/* EMP */
window.addEmp=()=>{
employees.push({name:"",phone:""});
renderEmployees();
}

function renderEmployees(){
const box=document.getElementById("empBox");
box.innerHTML="";

employees.forEach((e,i)=>{
box.innerHTML+=`
<div class="emp-item">
<input placeholder="Employee Name"
oninput="employees[${i}].name=this.value">

<input placeholder="Employee Phone"
oninput="employees[${i}].phone=this.value">
</div>
`;
});
}

/* OPEN */
window.openModal=()=>{
editId=null;
resetForm();
document.getElementById("modal").style.display="flex";
}

/* SAVE */
window.save=async()=>{

const data={
name:document.getElementById("name").value,
manager:document.getElementById("manager").value,
phone:document.getElementById("phone").value,
location:document.getElementById("location").value,
hours:document.getElementById("hours").value,
employees:[...employees]
};

if(editId){
await updateDoc(doc(db,"branches",editId),data);
}else{
await addDoc(collection(db,"branches"),data);
}

close();
load();
}

/* EDIT */
window.edit=(id)=>{
const b=branches.find(x=>x.id===id);
editId=id;

resetForm();

document.getElementById("name").value=b.name||"";
document.getElementById("manager").value=b.manager||"";
document.getElementById("phone").value=b.phone||"";
document.getElementById("location").value=b.location||"";
document.getElementById("hours").value=b.hours||"";

employees = b.employees ? [...b.employees] : [];
renderEmployees();

document.getElementById("modal").style.display="flex";
}

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"branches",id));
load();
}

/* CLOSE */
function close(){
document.getElementById("modal").style.display="none";
}

window.close=close;

load();

</script>

</body>
</html>
