<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased opacity-0">

<!-- شاشة تسجيل الدخول -->
<div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[9999]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md mx-4">
        <div class="text-center mb-6">
            <i class="fa-solid fa-mug-hot text-5xl text-amber-500"></i>
            <h2 class="text-2xl font-bold mt-3">تسجيل دخول الإدارة</h2>
        </div>
        <form id="loginForm" class="space-y-4">
            <input id="email" type="email" placeholder="البريد الإلكتروني" required class="w-full border rounded-lg px-4 py-3">
            <input id="password" type="password" placeholder="كلمة المرور" required class="w-full border rounded-lg px-4 py-3">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold">تسجيل الدخول</button>
            <p id="loginError" class="text-center text-red-500 text-sm"></p>
        </form>
    </div>
</div>

<div class="flex h-screen overflow-hidden">
    <!-- الشريط الجانبي -->
    <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center bg-slate-950 font-bold text-xl tracking-wide border-b border-slate-800">
            <i class="fa-solid mt-1 ml-2 fa-mug-hot text-amber-500"></i> FPs Coffee
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="#" class="flex items-center px-4 py-2.5 bg-blue-600 text-white rounded-lg transition-colors">
                <i class="fa-solid fa-house ml-3 w-5"></i> الرئيسية
            </a>
            
            <button id="maintenanceBtn" onclick="window.toggleMaintenance()" class="w-full flex items-center px-4 py-2.5 bg-gray-800 hover:bg-gray-700 text-white rounded-lg transition-colors mt-4">
                <i class="fa-solid fa-power-off ml-3 w-5 text-gray-400" id="maintenanceIcon"></i> 
                <span id="maintenanceText">وضع الصيانة: معطل</span>
            </button>
            
            <div class="pt-4 mt-4 border-t border-slate-800 space-y-2">
                <p class="text-xs text-gray-400 mb-2 px-2">قاعدة البيانات</p>
                <button onclick="window.exportBackup()" class="w-full flex items-center px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm transition-colors">
                    <i class="fa-solid fa-download ml-3 text-green-400"></i> نسخ احتياطي
                </button>
                <input type="file" id="restoreFile" accept=".json" class="hidden" onchange="window.handleRestore(event)">
                <button onclick="document.getElementById('restoreFile').click()" class="w-full flex items-center px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm transition-colors">
                    <i class="fa-solid fa-upload ml-3 text-amber-400"></i> استعادة نسخةاحتياطية                 </button>
            </div>
        </nav>
        <div class="p-4 border-t border-slate-800 text-sm text-slate-500 text-center">
            إصدار النظام 1.1
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="flex-1 flex flex-col overflow-y-auto overflow-x-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
            <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 w-64">
                <i class="fa-solid fa-magnifying-glass text-gray-400 ml-2"></i>
                <input type="text" id="adminSearch" placeholder="بحث سريع في الفروع..." onkeyup="window.searchAdminBranches()" class="bg-transparent focus:outline-none text-sm w-full">
            </div>
            <div class="relative">
                <button id="userMenuBtn" class="flex items-center cursor-pointer">
                    <span id="adminEmail" class="text-sm font-medium text-gray-700 ml-2">مدير النظام</span>
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">M</div>
                </button>
                <div id="userDropdown" class="hidden absolute left-0 top-12 w-48 bg-white rounded-xl shadow-lg border z-50">
                    <button onclick="window.logout()" class="w-full text-right px-4 py-3 hover:bg-red-50 text-red-600">تسجيل الخروج</button>
                </div>
            </div>
        </header>

        <main class="p-6 space-y-6 flex-1">
            <!-- الإحصائيات -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-xl order-last">
                        <i class="fa-solid fa-store"></i>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-medium">إجمالي الفروع</p>
                        <h3 id="firebase-branches-count" class="text-2xl font-bold text-gray-800 mt-1">-</h3>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center text-green-500 text-xl order-last">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-medium">الفروع النشطة</p>
                        <h3 id="active-branches-count" class="text-2xl font-bold text-gray-800 mt-1">-</h3>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div class="w-12 h-12 rounded-xl bg-red-50 flex items-center justify-center text-red-500 text-xl order-last">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-medium">الفروع غير النشطة</p>
                        <h3 id="inactive-branches-count" class="text-2xl font-bold text-gray-800 mt-1">-</h3>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                    <div class="w-12 h-12 rounded-xl bg-purple-50 flex items-center justify-center text-purple-500 text-xl order-last">
                        <i class="fa-solid fa-eye"></i>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 font-medium">إجمالي الزيارات</p>
                        <h3 id="total-visits-count" class="text-2xl font-bold text-gray-800 mt-1">0</h3>
                    </div>
                </div>
            </div>

            <!-- قائمة الفروع والأزرار -->
            <div class="space-y-4">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                    <h4 class="text-lg font-bold text-gray-800">قائمة الفروع الحالية</h4>
                    <div class="flex space-x-2 space-x-reverse">
                        <button onclick="window.openTransferModal()" class="flex items-center bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors">
                            <i class="fa-solid fa-right-left ml-2"></i> نقل موظف/مدير
                        </button>
                        <button onclick="window.openModal()" class="flex items-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors">
                            <i class="fa-solid fa-plus ml-2"></i> إضافة فرع جديد
                        </button>
                    </div>
                </div>

                <div id="branches-list-container" class="space-y-3">
                    <div class="text-center text-gray-400 py-8">جاري جلب الفروع الحالية...</div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- مودال إضافة / تعديل الفرع -->
<div id="branchModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl mx-4 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]">
        <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
            <h3 id="modalTitle" class="font-bold text-gray-800 text-lg">إضافة فرع جديد</h3>
            <button type="button" onclick="window.closeModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <form id="branchForm" class="p-6 space-y-4 overflow-y-auto flex-1">
            <input type="hidden" id="branchId">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-semibold text-gray-500 mb-1">حالة الفرع (الظهور في الموقع)</label>
                    <select id="branchStatus" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="true">🟢 نشط (يظهر في الموقع)</option>
                        <option value="false">🔴 غير نشط (مخفي)</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">اسم الفرع (بالعربي)</label>
                    <input type="text" id="branchNameAr" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">اسم الفرع (بالإنجليزي)</label>
                    <input type="text" id="branchNameEn" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">اسم مدير الفرع</label>
                    <input type="text" id="managerName" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">رقم هاتف المدير</label>
                    <input type="text" id="managerPhone" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-left" dir="ltr">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">مواعيد العمل</label>
                <input type="text" id="workingHours" required placeholder="من 9 صباحاً إلى 11 مساءً" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">رابط موقع الفرع على الخريطة</label>
                <input type="url" id="branchLocation" placeholder="https://maps.app.goo.gl/..." required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-left" dir="ltr">
            </div>

            <div class="border-t border-gray-100 pt-4 mt-2">
                <div class="flex items-center justify-between mb-3">
                    <span class="inline-block bg-amber-50 text-amber-700 text-xs px-2.5 py-1 rounded-md font-bold">بيانات الموظفين</span>
                    <button type="button" onclick="window.addEmployeeField()" class="text-xs bg-amber-500 hover:bg-amber-600 text-white px-2.5 py-1 rounded-md font-semibold transition-colors">
                        <i class="fa-solid fa-plus ml-1"></i> إضافة موظف آخر
                    </button>
                </div>
                <div id="employees-fields-container" class="space-y-3"></div>
            </div>

            <div class="flex items-center justify-end space-x-2 space-x-reverse pt-4 border-t border-gray-100 flex-shrink-0">
                <button type="button" onclick="window.closeModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors">إلغاء</button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors">حفظ البيانات</button>
            </div>
        </form>
    </div>
</div>

<!-- مودال نقل الموظفين / المديرين -->
<div id="transferModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 overflow-hidden transform scale-95 transition-transform duration-300">
        <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
            <h3 class="font-bold text-gray-800 text-lg">نقل موظف أو مدير</h3>
            <button type="button" onclick="window.closeTransferModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <form id="transferForm" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">الصفة الوظيفية</label>
                <select id="transferRole" onchange="window.handleTransferRoleChange()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm">
                    <option value="employee">موظف</option>
                    <option value="manager">مدير</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">من فرع (الفرع الحالي)</label>
                <select id="transferSource" onchange="window.handleTransferSourceChange()" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">اختر الشخص</label>
                <select id="transferPerson" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm"></select>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">إلى فرع (الوجهة الجديدة)</label>
                <select id="transferDest" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm"></select>
            </div>
            <div class="flex justify-end pt-4 border-t border-gray-100">
                <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white px-5 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors w-full">تنفيذ النقل</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc, getDocs, setDoc } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
        authDomain: "breadfast-coffee.firebaseapp.com",
        projectId: "breadfast-coffee",
        storageBucket: "breadfast-coffee.firebasestorage.app",
        messagingSenderId: "803906042715",
        appId: "1:803906042715:web:1e8977716adc54947b787e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let localBranchesCache = [];
    let isMaintenanceActive = false;

    // حالة التسجيل
    onAuthStateChanged(auth, (user) => {
        document.body.classList.remove("opacity-0");
        if (user) {
            document.getElementById('loginPage').classList.add("hidden");
            if (document.getElementById("adminEmail")) document.getElementById("adminEmail").textContent = user.email;
        } else {
            document.getElementById('loginPage').classList.remove("hidden");
        }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e)=>{
        e.preventDefault();
        try{
            await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
            document.getElementById("loginError").textContent = "";
        }catch(err){
            document.getElementById("loginError").textContent = "الإيميل أو كلمة المرور غير صحيحة";
        }
    });

    window.logout = async () => await signOut(auth);

    // القائمة المنسدلة للمستخدم
    const menuBtn = document.getElementById("userMenuBtn");
    const dropdown = document.getElementById("userDropdown");
    if(menuBtn) menuBtn.addEventListener("click", (e)=>{ e.stopPropagation(); dropdown.classList.toggle("hidden"); });
    document.addEventListener("click", ()=>{ if(dropdown) dropdown.classList.add("hidden"); });

    // الاستماع لحالة الصيانة
    onSnapshot(doc(db, "settings", "general"), (docSnap) => {
        if (docSnap.exists()) {
            isMaintenanceActive = docSnap.data().isMaintenance || false;
            updateMaintenanceUI();
        }
    });

    function updateMaintenanceUI() {
        const btn = document.getElementById("maintenanceBtn");
        const icon = document.getElementById("maintenanceIcon");
        const text = document.getElementById("maintenanceText");
        if (isMaintenanceActive) {
            btn.classList.add("bg-amber-600", "hover:bg-amber-700");
            btn.classList.remove("bg-gray-800", "hover:bg-gray-700");
            icon.classList.add("text-white"); icon.classList.remove("text-gray-400");
            text.innerText = "وضع الصيانة: مفعل";
        } else {
            btn.classList.remove("bg-amber-600", "hover:bg-amber-700");
            btn.classList.add("bg-gray-800", "hover:bg-gray-700");
            icon.classList.remove("text-white"); icon.classList.add("text-gray-400");
            text.innerText = "وضع الصيانة: معطل";
        }
    }

    window.toggleMaintenance = async function() {
        try {
            await setDoc(doc(db, "settings", "general"), { isMaintenance: !isMaintenanceActive }, { merge: true });
            showToast(!isMaintenanceActive ? "تم تفعيل وضع الصيانة" : "تم إلغاء وضع الصيانة");
        } catch(e) {
            showToast("حدث خطأ", "error");
        }
    };

    // الاستماع المباشر للفروع والإحصائيات
    onSnapshot(collection(db, "branches"), (snapshot) => {
        const data = [];
        let totalVisits = 0, activeCount = 0, inactiveCount = 0;

        snapshot.forEach(doc => {
            const bData = doc.data();
            data.push({ id: doc.id, ...bData });
            if(bData.visits) totalVisits += Number(bData.visits);
            if(bData.isActive === false) inactiveCount++; else activeCount++;
        });

        localBranchesCache = data;
        document.getElementById("firebase-branches-count").innerText = data.length;
        document.getElementById("active-branches-count").innerText = activeCount;
        document.getElementById("inactive-branches-count").innerText = inactiveCount;
        document.getElementById("total-visits-count").innerText = totalVisits.toLocaleString();

        renderAdminBranches(data);
    });

    function formatDate(isoString) {
        if(!isoString) return 'تاريخ غير محدد';
        const d = new Date(isoString);
        return d.toLocaleDateString('ar-EG');
    }

    function renderAdminBranches(list) {
        const container = document.getElementById("branches-list-container");
        container.innerHTML = "";
        if (list.length === 0) { container.innerHTML = `<div class="text-center text-gray-400 py-8">لا توجد فروع حالياً.</div>`; return; }

        list.forEach(b => {
            const card = document.createElement("div");
            card.className = `bg-white p-4 rounded-xl shadow-sm border ${b.isActive === false ? 'border-red-200 bg-red-50' : 'border-gray-100'} flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 transition-all`;
            
            const statusBadge = b.isActive === false 
                ? `<span class="text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-bold ml-2">🔴 غير نشط</span>`
                : `<span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold ml-2">🟢 نشط</span>`;

            card.innerHTML = `
                <div class="flex items-center space-x-4 space-x-reverse">
                    <a href="${b.location || '#'}" target="_blank" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center text-lg font-bold flex-shrink-0">
                        <i class="fa-solid fa-location-dot"></i>
                    </a>
                    <div class="text-right">
                        <h5 class="font-bold text-gray-800 text-base">${b.nameAr || b.name} ${statusBadge}</h5>
                        <p class="text-xs text-gray-500 mt-1">
                            المدير: ${b.managerName || 'لا يوجد'} | الموظفين: ${(b.employees || []).length} | تاريخ الإضافة: ${formatDate(b.createdAt)}
                        </p>
                    </div>
                </div>
                <div class="flex items-center space-x-2 space-x-reverse">
                    <button onclick='window.prepareEdit("${b.id}")' class="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-medium">
                        <i class="fa-solid fa-pen-to-square"></i> تعديل
                    </button>
                    <button onclick='window.deleteBranch("${b.id}")' class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-medium">
                        <i class="fa-solid fa-trash"></i> حذف
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // حفظ وإضافة وتعديل الفروع
    document.getElementById("branchForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const bId = document.getElementById("branchId").value;
        const employeesArray = [];
        document.querySelectorAll(".employee-row").forEach(row => {
            const name = row.querySelector(".emp-name-input").value;
            const phone = row.querySelector(".emp-phone-input").value;
            if(name.trim() !== "") employeesArray.push({ name, phone });
        });

        const docData = {
            isActive: document.getElementById("branchStatus").value === "true",
            nameAr: document.getElementById("branchNameAr").value,
            name: document.getElementById("branchNameEn").value,
            managerName: document.getElementById("managerName").value,
            phone: document.getElementById("managerPhone").value,
            workingHours: document.getElementById("workingHours").value,
            location: document.getElementById("branchLocation").value,
            employees: employeesArray
        };

        try {
            if (bId === "") {
                docData.visits = 0;
                docData.createdAt = new Date().toISOString(); // تاريخ الإضافة
                await addDoc(collection(db, "branches"), docData);
                showToast("تم إضافة الفرع بنجاح");
            } else {
                await updateDoc(doc(db, "branches", bId), docData);
                showToast("تم تحديث البيانات بنجاح");
            }
            window.closeModal();
        } catch (error) {
            showToast("حدث خطأ أثناء الحفظ","error");
        }
    });

    // تجهيز الداتا للتعديل
    window.prepareEdit = function(id) {
        const b = localBranchesCache.find(item => item.id === id);
        if (!b) return;
        document.getElementById("branchId").value = b.id;
        document.getElementById("branchStatus").value = b.isActive === false ? "false" : "true";
        document.getElementById("branchNameAr").value = b.nameAr || '';
        document.getElementById("branchNameEn").value = b.name || '';
        document.getElementById("managerName").value = b.managerName || '';
        document.getElementById("managerPhone").value = b.phone || '';
        document.getElementById("workingHours").value = b.workingHours || '';
        document.getElementById("branchLocation").value = b.location || '';
        
        const container = document.getElementById("employees-fields-container");
        container.innerHTML = "";
        if(b.employees && b.employees.length > 0) {
            b.employees.forEach(emp => window.addEmployeeField(emp.name || emp, emp.phone || ''));
        } else {
            window.addEmployeeField();
        }
        document.getElementById("modalTitle").innerText = "تعديل بيانات الفرع";
        window.openModal();
    };

    window.deleteBranch = async function(id) {
        if (confirm("هل أنت متأكد من الحذف؟")) {
            try { await deleteDoc(doc(db, "branches", id)); showToast("تم الحذف بنجاح"); } 
            catch (error) { showToast("فشل الحذف","error"); }
        }
    };

    window.searchAdminBranches = function() {
        const query = document.getElementById("adminSearch").value.toLowerCase();
        const filtered = localBranchesCache.filter(b => (b.nameAr || "").toLowerCase().includes(query) || (b.name || "").toLowerCase().includes(query));
        renderAdminBranches(filtered);
    };

    window.addEmployeeField = function(name = '', phone = '') {
        const container = document.getElementById("employees-fields-container");
        const rowId = 'emp_' + Date.now();
        const row = document.createElement("div");
        row.id = rowId;
        row.className = "employee-row grid grid-cols-1 sm:grid-cols-2 gap-4 bg-white p-3 rounded-lg border relative";
        row.innerHTML = `
            <div><input type="text" value="${name}" placeholder="الاسم" class="emp-name-input w-full border rounded px-2 py-1 text-sm"></div>
            <div><input type="text" value="${phone}" placeholder="الهاتف" class="emp-phone-input w-full border rounded px-2 py-1 text-sm text-left" dir="ltr"></div>
            <button type="button" onclick="window.removeEmployeeField('${rowId}')" class="absolute top-1 left-1 text-red-500"><i class="fa-solid fa-xmark"></i></button>
        `;
        container.appendChild(row);
    };
    window.removeEmployeeField = function(id) { document.getElementById(id)?.remove(); };

    window.openModal = function() {
        document.getElementById('branchModal').classList.remove('hidden');
        setTimeout(() => { document.getElementById('branchModal').classList.remove('opacity-0'); document.getElementById('branchModal').querySelector('.transform').classList.remove('scale-95'); }, 10);
    };
    window.closeModal = function() {
        document.getElementById('branchModal').classList.add('opacity-0');
        document.getElementById('branchModal').querySelector('.transform').classList.add('scale-95');
        setTimeout(() => { document.getElementById('branchModal').classList.add('hidden'); document.getElementById("branchForm").reset(); document.getElementById("branchId").value = ""; document.getElementById("employees-fields-container").innerHTML = ""; document.getElementById("modalTitle").innerText = "إضافة فرع جديد"; }, 300);
    };

    // ----- نظام النقل (Transfer System) -----
    window.openTransferModal = function() {
        populateTransferDropdowns();
        document.getElementById('transferModal').classList.remove('hidden');
        setTimeout(() => { document.getElementById('transferModal').classList.remove('opacity-0'); document.getElementById('transferModal').querySelector('.transform').classList.remove('scale-95'); }, 10);
    };

    window.closeTransferModal = function() {
        document.getElementById('transferModal').classList.add('opacity-0');
        setTimeout(() => { document.getElementById('transferModal').classList.add('hidden'); document.getElementById('transferForm').reset(); }, 300);
    };

    function populateTransferDropdowns() {
        const sourceSelect = document.getElementById("transferSource");
        const destSelect = document.getElementById("transferDest");
        sourceSelect.innerHTML = '<option value="">-- اختر الفرع --</option>';
        destSelect.innerHTML = '<option value="">-- اختر الفرع --</option>';
        localBranchesCache.forEach(b => {
            const opt = `<option value="${b.id}">${b.nameAr || b.name}</option>`;
            sourceSelect.innerHTML += opt;
            destSelect.innerHTML += opt;
        });
    }

    window.handleTransferRoleChange = () => window.handleTransferSourceChange();

    window.handleTransferSourceChange = function() {
        const role = document.getElementById("transferRole").value;
        const sourceId = document.getElementById("transferSource").value;
        const personSelect = document.getElementById("transferPerson");
        personSelect.innerHTML = '<option value="">-- اختر الشخص --</option>';
        
        if(!sourceId) return;
        const branch = localBranchesCache.find(b => b.id === sourceId);
        
        if (role === 'manager' && branch.managerName) {
            personSelect.innerHTML += `<option value="MANAGER_ID">${branch.managerName}</option>`;
        } else if (role === 'employee' && branch.employees) {
            branch.employees.forEach((emp, index) => {
                personSelect.innerHTML += `<option value="${index}">${emp.name || emp}</option>`;
            });
        }
    };

    document.getElementById("transferForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const role = document.getElementById("transferRole").value;
        const sourceId = document.getElementById("transferSource").value;
        const personVal = document.getElementById("transferPerson").value;
        const destId = document.getElementById("transferDest").value;

        if(!sourceId || !personVal || !destId) { showToast("يرجى إكمال البيانات", "error"); return; }
        if(sourceId === destId) { showToast("لا يمكن النقل لنفس الفرع", "error"); return; }

        const sourceBranch = localBranchesCache.find(b => b.id === sourceId);
        const destBranch = localBranchesCache.find(b => b.id === destId);

        try {
            if (role === 'manager') {
                const managerName = sourceBranch.managerName;
                const managerPhone = sourceBranch.phone;
                await updateDoc(doc(db, "branches", sourceId), { managerName: "", phone: "" });
                await updateDoc(doc(db, "branches", destId), { managerName, phone: managerPhone });
            } else {
                const empIndex = parseInt(personVal);
                const employeeToMove = sourceBranch.employees[empIndex];
                
                const newSourceEmployees = [...sourceBranch.employees];
                newSourceEmployees.splice(empIndex, 1);
                
                const newDestEmployees = destBranch.employees ? [...destBranch.employees] : [];
                newDestEmployees.push(employeeToMove);

                await updateDoc(doc(db, "branches", sourceId), { employees: newSourceEmployees });
                await updateDoc(doc(db, "branches", destId), { employees: newDestEmployees });
            }
            showToast("تم النقل بنجاح!");
            window.closeTransferModal();
        } catch(err) {
            showToast("حدث خطأ أثناء النقل", "error");
        }
    });

    // ----- النسخ الاحتياطي والاسترداد -----
    window.exportBackup = async () => {
        try {
            const snapshot = await getDocs(collection(db, "branches"));
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `FPs_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast("تم تحميل النسخة الاحتياطية");
        } catch(e) { showToast("فشل النسخ الاحتياطي", "error"); }
    };

    window.handleRestore = async (event) => {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                for(const item of data) {
                    const {id, ...rest} = item;
                    await setDoc(doc(db, "branches", id), rest); // يضيف أو يحدث البيانات
                }
                showToast("تم استرداد البيانات بنجاح");
                document.getElementById('restoreFile').value = '';
            } catch(err) {
                showToast("ملف غير صالح أو فشل الاسترداد", "error");
            }
        };
        reader.readAsText(file);
    };

</script>

<!-- توست الإشعارات -->
<div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-[99999] hidden">
  <div id="toastContent" class="bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 min-w-[280px]">
    <i id="toastIcon" class="fa-solid fa-circle-check text-green-400"></i>
    <span id="toastText">تمت العملية بنجاح</span>
  </div>
</div>

<script>
window.showToast = function(message,type='success'){
 const toast=document.getElementById('toast');
 const text=document.getElementById('toastText');
 const icon=document.getElementById('toastIcon');
 text.textContent=message;
 if(type==='error'){ icon.className='fa-solid fa-circle-xmark text-red-400'; }
 else{ icon.className='fa-solid fa-circle-check text-green-400'; }
 toast.classList.remove('hidden');
 toast.animate([ {transform:'translate(-50%,-20px)',opacity:0}, {transform:'translate(-50%,0)',opacity:1} ],{duration:250,fill:'forwards'});
 clearTimeout(window.toastTimer);
 window.toastTimer=setTimeout(()=> toast.classList.add('hidden'), 3000);
}
</script>
</body>
</html>
