<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:#111827;
    min-height:100vh;
    padding:20px;
}

.sidebar h2{
    font-size:18px;
    margin-bottom:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    background:#1f2937;
}

/* Main */
.main{
    flex:1;
    padding:20px;
}

/* Top bar */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* Cards */
.cards{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:#1e293b;
    padding:15px;
    border-radius:10px;
}

/* Form */
form{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

input,button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:10px;
    border-bottom:1px solid #334155;
    text-align:left;
}

.delete{
    background:#ef4444;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h2>⚡ Admin Panel</h2>

<a href="#"><i class="fa fa-home"></i> Dashboard</a>
<a href="#"><i class="fa fa-map"></i> Branches</a>
<a href="#"><i class="fa fa-user"></i> Users</a>
<a href="#"><i class="fa fa-gear"></i> Settings</a>
</div>

<!-- Main -->
<div class="main">

<div class="topbar">
<h2>Dashboard</h2>
<p>Welcome Admin 👋</p>
</div>

<!-- Cards -->
<div class="cards">
<div class="card">
<h3 id="count">0</h3>
<p>Total Branches</p>
</div>
</div>

<!-- Form -->
<form>
<input id="nameEn" placeholder="Name EN">
<input id="nameAr" placeholder="Name AR">
<input id="map" placeholder="Google Map Link">
<button type="button" onclick="addBranch()">Add Branch</button>
</form>

<!-- Table -->
<table>
<thead>
<tr>
<th>English</th>
<th>Arabic</th>
<th>Action</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
  authDomain: "breadfast-coffee.firebaseapp.com",
  projectId: "breadfast-coffee",
  storageBucket: "breadfast-coffee.firebasestorage.app",
  messagingSenderId: "803906042715",
  appId: "1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let branches = [];

// LIVE DATA
onSnapshot(collection(db,"branches"), (snap)=>{

    branches = [];

    snap.forEach(d=>{
        branches.push({id:d.id,...d.data()});
    });

    document.getElementById("count").innerText = branches.length;

    render();
});

// ADD
window.addBranch = async function(){

    await addDoc(collection(db,"branches"),{
        name:document.getElementById("nameEn").value,
        nameAr:document.getElementById("nameAr").value,
        map:document.getElementById("map").value
    });

};

// DELETE
window.deleteBranch = async function(id){

    await deleteDoc(doc(db,"branches",id));
};

// RENDER
function render(){

    let table = document.getElementById("table");
    table.innerHTML="";

    branches.forEach(b=>{

        table.innerHTML += `
        <tr>
            <td>${b.name}</td>
            <td>${b.nameAr}</td>
            <td>
                <button class="delete" onclick="deleteBranch('${b.id}')">Delete</button>
            </td>
        </tr>
        `;
    });
}

</script>

</body>
</html>
