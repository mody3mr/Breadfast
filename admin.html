<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:#f1f5f9;
}

/* LOGIN */

.login-box{

width:350px;
background:white;
padding:30px;
border-radius:20px;

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

box-shadow:0 20px 40px #0002;

}


.login-box h2{
text-align:center;
}


input{

width:100%;
padding:12px;
margin:10px 0;

border:1px solid #ddd;
border-radius:10px;

}


button{

width:100%;
padding:12px;

border:0;
border-radius:10px;

background:#2563eb;
color:white;

cursor:pointer;

}


/* DASHBOARD */


.dashboard{

display:none;

}


.sidebar{

position:fixed;

right:0;

top:0;

height:100vh;

width:230px;

background:#111827;

color:white;

padding:20px;

}


.sidebar button{

background:none;

text-align:right;

margin-bottom:15px;

}


.content{

margin-right:250px;

padding:30px;

}


/* CARDS */


.cards{

display:flex;

gap:20px;

}


.card{

background:white;

padding:25px;

border-radius:15px;

width:200px;

box-shadow:0 10px 25px #0001;

}



/* TOAST */


#toast{

position:fixed;

bottom:30px;

right:30px;

background:#111827;

color:white;

padding:15px 25px;

border-radius:12px;

display:none;

animation:show .3s;

}


@keyframes show{

from{

transform:translateY(50px);

opacity:0;

}

to{

transform:translateY(0);

opacity:1;

}

}



</style>

</head>


<body>



<!-- LOGIN -->

<div class="login-box" id="loginBox">


<h2>Admin Login</h2>


<input id="email" placeholder="Email">


<input id="password" type="password" placeholder="Password">


<button onclick="login()">
Login
</button>


</div>





<!-- DASHBOARD -->


<div class="dashboard" id="dashboard">


<div class="sidebar">


<h2>
Menu
</h2>


<button>
Dashboard
</button>


<button onclick="showBranches()">
Branches
</button>


<button>
Users
</button>


<button>
Settings
</button>



</div>





<div class="content">


<h1>
Dashboard
</h1>


<div class="cards">


<div class="card">

<h3>
Total Branches
</h3>

<h1 id="count">
0
</h1>


</div>


</div>



</div>


</div>




<div id="toast"></div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";




import {

getFirestore,

collection,

getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {


apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",

authDomain: "breadfast-coffee.firebaseapp.com",

projectId: "breadfast-coffee",

storageBucket: "breadfast-coffee.firebasestorage.app",

messagingSenderId: "803906042715",

appId: "1:803906042715:web:1e8977716adc54947b787e"

};



const app = initializeApp(firebaseConfig);


const auth = getAuth(app);


const db = getFirestore(app);






// TOAST


function toast(msg){


let t=document.getElementById("toast");


t.innerHTML=msg;


t.style.display="block";


setTimeout(()=>{


t.style.display="none";


},3000);


}







// LOGIN


window.login=async function(){


let email=document.getElementById("email").value.trim();


let pass=document.getElementById("password").value.trim();



if(email==""){

toast("⚠️ من فضلك أدخل البريد الإلكتروني");

return;

}



if(pass==""){

toast("⚠️ من فضلك أدخل كلمة المرور");

return;

}




try{


await signInWithEmailAndPassword(auth,email,pass);



toast("✅ تم تسجيل الدخول بنجاح");



document.getElementById("loginBox").style.display="none";


document.getElementById("dashboard").style.display="block";



loadCount();



}



catch(error){



if(error.code=="auth/user-not-found"){

toast("❌ هذا البريد غير مسجل في النظام");

}


else if(error.code=="auth/wrong-password"){

toast("❌ كلمة المرور غير صحيحة");

}


else{

toast("❌ حدث خطأ أثناء تسجيل الدخول");

}



}



}







async function loadCount(){


let snap=await getDocs(collection(db,"branches"));


document.getElementById("count").innerHTML=snap.size;


}



window.showBranches=function(){

toast("صفحة الفروع هنكملها بالنسخة القادمة");

}





</script>



</body>

</html>
