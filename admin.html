<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FPs Admin Panel</title>


<style>


*{
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}


body{

margin:0;

background:#f1f5f9;

}


/* ================= LOGIN ================= */


.login-page{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(135deg,#7c3aed,#ec4899);

}



.login-card{

background:white;

width:380px;

padding:35px;

border-radius:25px;

box-shadow:0 25px 70px #0005;

text-align:center;

}



.login-card h1{

margin-bottom:25px;

color:#111827;

}



.input{

width:100%;

padding:14px;

margin:10px 0;

border-radius:12px;

border:1px solid #ddd;

font-size:15px;

}



.login-btn{

width:100%;

padding:14px;

border:0;

border-radius:12px;

background:#7c3aed;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}


.login-btn:hover{

transform:translateY(-3px);

}



/* ================= DASHBOARD ================= */


.dashboard{

display:none;

}



/* SIDEBAR */


.sidebar{

position:fixed;

right:0;

top:0;

width:260px;

height:100vh;

background:#111827;

color:white;

padding:25px;

}



.logo{

font-size:24px;

font-weight:bold;

margin-bottom:40px;

}



.nav{

padding:14px;

margin-bottom:12px;

border-radius:15px;

cursor:pointer;

display:flex;

gap:12px;

align-items:center;

color:#cbd5e1;

transition:.3s;

}



.nav:hover{

background:#1f2937;

color:white;

}



.nav.active{

background:linear-gradient(135deg,#7c3aed,#ec4899);

color:white;

}





.logout{

position:absolute;

bottom:30px;

width:210px;

background:#ef4444;

color:white;

}




/* CONTENT */


.content{

margin-right:260px;

padding:35px;

}




.header{

display:flex;

justify-content:space-between;

align-items:center;

}



.admin-box{

background:white;

padding:12px 20px;

border-radius:15px;

box-shadow:0 10px 25px #0001;

}



/* CARDS */


.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;

}



.card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 15px 35px #0001;

animation:show .5s;

}


.card h2{

font-size:40px;

color:#7c3aed;

margin:10px 0;

}



@keyframes show{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* TOAST */


#toast{

position:fixed;

bottom:30px;

right:30px;

padding:15px 25px;

background:#111827;

color:white;

border-radius:15px;

display:none;

z-index:999;

animation:toast .3s;

}



@keyframes toast{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}



</style>

</head>



<body>



<!-- LOGIN -->


<div class="login-page" id="loginPage">


<form class="login-card" onsubmit="event.preventDefault();login();">


<h1>
☕ FPs Admin
</h1>


<input 
class="input"
id="email"
placeholder="Email">



<input
class="input"
id="password"
type="password"
placeholder="Password">



<button class="login-btn">

Login

</button>


</form>


</div>






<!-- DASHBOARD -->


<div class="dashboard" id="dashboard">



<div class="sidebar">


<div class="logo">

☕ FPs Coffee

</div>



<div class="nav active">

🏠 Dashboard

</div>



<div class="nav">

📍 Branches

</div>



<div class="nav">

👥 Users

</div>



<div class="nav">

⚙ Settings

</div>



<div class="nav logout" onclick="logout()">

🚪 Logout

</div>


</div>






<div class="content">


<div class="header">


<h1>
Welcome Admin 👋
</h1>


<div class="admin-box">

Admin

</div>


</div>





<div class="cards">


<div class="card">

<p>
Total Branches
</p>


<h2 id="branchesCount">
0
</h2>


</div>



<div class="card">

<p>
Total Visits
</p>


<h2>
0
</h2>


</div>



<div class="card">

<p>
Active Users
</p>


<h2>
1
</h2>


</div>


</div>


</div>



</div>






<div id="toast"></div>








<script type="module">



import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";



import {

getAuth,

signInWithEmailAndPassword,

signOut

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



import {

getFirestore,

collection,

getDocs

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





const firebaseConfig = {

apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",

authDomain: "breadfast-coffee.firebaseapp.com",

projectId: "breadfast-coffee",

storageBucket: "breadfast-coffee.firebasestorage.app",

messagingSenderId: "803906042715",

appId: "1:803906042715:web:1e8977716adc54947b787e"

};




const app = initializeApp(firebaseConfig);


const auth=getAuth(app);


const db=getFirestore(app);






function showToast(message){


let t=document.getElementById("toast");


t.innerHTML=message;


t.style.display="block";


setTimeout(()=>{

t.style.display="none";

},3000);


}






window.login=async function(){



let email=document.getElementById("email").value.trim();


let password=document.getElementById("password").value.trim();




if(!email){

showToast("⚠️ من فضلك اكتب البريد الإلكتروني");

return;

}



if(!password){

showToast("⚠️ من فضلك اكتب كلمة المرور");

return;

}




try{


await signInWithEmailAndPassword(auth,email,password);



showToast("✅ تم تسجيل الدخول بنجاح");



document.getElementById("loginPage").style.display="none";


document.getElementById("dashboard").style.display="block";



loadBranches();


}



catch(error){



if(error.code==="auth/user-not-found"){

showToast("❌ البريد غير مسجل في النظام");

}

else if(error.code==="auth/wrong-password"){

showToast("❌ كلمة المرور غير صحيحة");

}

else{

showToast("❌ بيانات الدخول غير صحيحة");

}


}


}






async function loadBranches(){


let snap=await getDocs(collection(db,"branches"));


document.getElementById("branchesCount").innerHTML=snap.size;


}






window.logout=function(){


signOut(auth);


location.reload();


}



</script>



</body>

</html>
