<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="h-16 flex items-center justify-center bg-slate-950 font-bold text-xl tracking-wide border-b border-slate-800">
                <i class="fa-solid mt-1 ml-2 fa-chart-line text-blue-500"></i> مشروعك الذكي
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="#" class="flex items-center px-4 py-2.5 bg-blue-600 text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-house ml-3 w-5"></i> الرئيسة
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-users ml-3 w-5"></i> المستخدمين
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-boxes-stacked ml-3 w-5"></i> المنتجات
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-file-invoice-dollar ml-3 w-5"></i> التقارير
                </a>
                <a href="#" class="flex items-center px-4 py-2.5 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-gear ml-3 w-5"></i> الإعدادات
                </a>
            </nav>
            <div class="p-4 border-t border-slate-800 text-sm text-slate-500 text-center">
                إصدار النظام 1.0
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto overflow-x-hidden">
            
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
                <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 w-64">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 ml-2"></i>
                    <input type="text" placeholder="بحث سريع..." class="bg-transparent focus:outline-none text-sm w-full">
                </div>
                
                <div class="flex items-center space-x-4 space-x-reverse">
                    <div class="flex items-center cursor-pointer">
                        <span class="text-sm font-medium text-gray-700 ml-2">مدير النظام</span>
                        <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">
                            M
                        </div>
                    </div>
                </div>
            </header>

            <main class="p-6 flex-1">
                
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center text-gray-400">
                    <i class="fa-solid fa-code text-4xl mb-3 block"></i>
                    المساحة دي جاهزة ومستنية إبداعك.. قولي حابب نظهر إيه هنا؟
                </div>
                </main>
        </div>
    </div>

</body>
</html>
