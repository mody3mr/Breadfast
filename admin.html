<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        
        const firebaseConfig = { apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8", authDomain:"breadfast-coffee.firebaseapp.com", projectId:"breadfast-coffee", storageBucket:"breadfast-coffee.firebasestorage.app", messagingSenderId:"803906042715", appId:"1:803906042715:web:1e8977716adc54947b787e" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) document.getElementById('login-modal').classList.remove('hidden');
        });

        window.login = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, email, pass); window.location.reload(); }
            catch(e) { alert("خطأ في البيانات"); }
        }
    </script>
</head>
<body>
    <!-- نظام تسجيل الدخول -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/90 z-[9999] flex items-center justify-center hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 text-center">
            <h2 class="text-xl font-bold mb-4">تسجيل الدخول للإدارة</h2>
            <input type="email" id="email" placeholder="البريد" class="w-full border p-2 mb-2 rounded">
            <input type="password" id="pass" placeholder="كلمة المرور" class="w-full border p-2 mb-4 rounded">
            <button onclick="login()" class="bg-blue-600 text-white w-full py-2 rounded">دخول</button>
        </div>
    </div>

    <!-- هنا تضع الكود الأصلي الخاص بك للداشبورد -->
    <div class="p-6">
        <h1>مرحباً بك في لوحة التحكم</h1>
        <!-- باقي محتواك -->
    </div>
</body>
</html>
