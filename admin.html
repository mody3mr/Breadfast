<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #0f172a; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md text-center">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">تسجيل دخول الإدارة</h2>
            <form id="loginForm" class="space-y-4 text-right">
                <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-gray-50 border rounded-lg text-gray-800 text-left" dir="ltr">
                <input type="password" id="password" required placeholder="كلمة المرور" class="w-full px-4 py-3 bg-gray-50 border rounded-lg text-gray-800 text-left" dir="ltr">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg">دخول النظام</button>
            </form>
        </div>
    </div>

    <div id="dashboardPage" class="hidden-section flex min-h-screen">
        <aside class="w-64 bg-slate-950 p-6 border-l border-slate-800">
            <h1 class="text-xl font-bold text-white mb-8 text-center">FPs Coffee ☕</h1>
            <nav class="space-y-2">
                <a href="#main" class="block px-4 py-3 bg-blue-600 rounded-lg text-white">الرئيسية</a>
                <a href="#users" class="block px-4 py-3 text-slate-400 hover:text-white">المستخدمين</a>
            </nav>
        </aside>
        <main class="flex-1 p-8">
            <div id="section-main">
                <h4 class="text-lg font-bold text-white mb-6">قائمة الفروع</h4>
                </div>
        </main>
    </div>

    <script>
        // 🚨 هام جداً: تأكد إن هذه البيانات هي اللي كانت في ملفك الأصلي
        const firebaseConfig = {
            // انسخ هنا بيانات مشروعك الحقيقية من ملفك الأصلي
            // apiKey: "...",
            // authDomain: "...",
            // projectId: "...",
            // ... باقي البيانات
        };
        
        firebase.initializeApp(firebaseConfig);

        // حل مشكلة علامة الاستفهام
        if (window.location.href.includes('?')) {
            const cleanUrl = window.location.href.replace('?', '');
            window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            firebase.auth().signInWithEmailAndPassword(email, password)
            .then(() => { window.location.hash = "#main"; location.reload(); })
            .catch((error) => { alert("خطأ: " + error.message); });
        });

        // تشغيل اللوحة إذا كان المستخدم مسجل دخول
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginPage').classList.add('hidden-section');
                document.getElementById('dashboardPage').classList.remove('hidden-section');
            }
        });
    </script>
</body>
</html>
