<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* LOGIN */
#loginBox{
    width:320px;
    margin:120px auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#22c55e;
    color:white;
    cursor:pointer;
}

/* APP */
#app{display:none;}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#111827;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    padding:15px;
}

.sidebar button{
    background:#1f2937;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:20px;
}

.page{display:none;}
.active{display:block;}

/* TABLE */
table{
    width:100%;
    background:#1e293b;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #334155;
}

/* TOAST CENTER */
.toast{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:#22c55e;
    color:white;
    padding:15px 20px;
    border-radius:12px;
    opacity:0;
    transition:0.25s;
    z-index:9999;
    text-align:center;
    min-width:220px;
}

.toast.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

.toast.error{
    background:#ef4444;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<h3>Admin</h3>

<button onclick="show('home')">Home</button>
<button onclick="show('branches')">Branches</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="home" class="page active">
<h2>Dashboard</h2>
<h3 id="count">0</h3>
</div>

<div id="branches" class="page">

<h2>Branches</h2>

<input id="nameEn" placeholder="Name EN">
<input id="nameAr" placeholder="Name AR">
<input id="map" placeholder="Map">

<button onclick="addBranch()">Add</button>

<table>
<tbody id="table"></tbody>
</table>

</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
  authDomain: "breadfast-coffee.firebaseapp.com",
  projectId: "breadfast-coffee",
  storageBucket: "breadfast-coffee.firebasestorage.app",
  messagingSenderId: "803906042715",
  appId: "1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let branches = [];

/* ================= TOAST ================= */
function toast(msg,type="success"){

    let t=document.createElement("div");
    t.className="toast";
    t.innerText=msg;

    if(type==="error") t.classList.add("error");

    document.body.appendChild(t);

    setTimeout(()=>t.classList.add("show"),100);

    setTimeout(()=>{
        t.classList.remove("show");
        setTimeout(()=>t.remove(),200);
    },2500);
}

/* ================= LOGIN ================= */
window.login = function(){

    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();

    // 🔥 VALIDATION BEFORE FIREBASE
    if(!email){
        toast("Please enter email ❌","error");
        return;
    }

    if(!pass){
        toast("Please enter password ❌","error");
        return;
    }

    signInWithEmailAndPassword(auth,email,pass)
    .then(()=>{
        toast("Login successful 🔥");
    })
    .catch((err)=>{

        if(err.code === "auth/user-not-found"){
            toast("This email is not registered ❌","error");
        }
        else if(err.code === "auth/wrong-password"){
            toast("Wrong password ❌","error");
        }
        else{
            toast("Login failed ❌","error");
        }
    });
};

/* ================= AUTH ================= */
onAuthStateChanged(auth,(user)=>{

    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
    }else{
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

/* ================= LOGOUT ================= */
window.logout = function(){
    signOut(auth);
};

/* ================= REALTIME ================= */
onSnapshot(collection(db,"branches"),(snap)=>{

    branches=[];
    snap.forEach(d=>{
        branches.push({id:d.id,...d.data()});
    });

    document.getElementById("count").innerText = branches.length;

    render();
});

/* ================= ADD ================= */
window.addBranch = async function(){

    if(!nameEn.value || !nameAr.value || !map.value){
        toast("Please fill all fields ❌","error");
        return;
    }

    await addDoc(collection(db,"branches"),{
        name:nameEn.value,
        nameAr:nameAr.value,
        map:map.value
    });

    toast("Branch added successfully ✅");
};

/* ================= DELETE ================= */
window.deleteBranch = async function(id){

    await deleteDoc(doc(db,"branches",id));

    toast("Branch deleted 🗑️");
};

/* ================= RENDER ================= */
function render(){

    let table=document.getElementById("table");
    table.innerHTML="";

    branches.forEach(b=>{

        table.innerHTML+=`
        <tr>
            <td>${b.name}</td>
            <td>${b.nameAr}</td>
            <td>
                <button onclick="deleteBranch('${b.id}')">Delete</button>
            </td>
        </tr>
        `;
    });
}

/* ================= NAV ================= */
window.show=function(id){

    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
};

</script>

</body>
</html>
