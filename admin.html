<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>body { background-color: #0f172a; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="loginCard" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
        <h2 class="text-2xl font-bold mb-6">تسجيل دخول الإدارة</h2>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full p-3 border rounded-lg" dir="ltr">
            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full p-3 border rounded-lg" dir="ltr">
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg">دخول النظام</button>
        </form>
    </div>

    <script>
        // 1. ضع بيانات مشروعك الحقيقية هنا بدلاً من النقط
        const firebaseConfig = {
            apiKey: "ضع_الـ_apiKey_الحقيقي_هنا",
            authDomain: "breadfast-coffee.firebaseapp.com",
            projectId: "breadfast-coffee",
            storageBucket: "breadfast-coffee.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:..."
        };
        
        firebase.initializeApp(firebaseConfig);

        // 2. تنظيف الرابط من علامة الاستفهام
        if (window.location.href.includes('?')) {
            window.history.replaceState(null, '', window.location.pathname + window.location.hash);
        }

        // 3. معالجة تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            
            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            firebase.auth().signInWithEmailAndPassword(email, password)
            .then(() => {
                alert("تم تسجيل الدخول بنجاح!");
                location.reload(); 
            })
            .catch((error) => {
                alert("خطأ: " + error.message);
                btn.innerText = "دخول النظام";
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
