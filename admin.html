<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية - FPs Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased opacity-0">

<div id="loginPage" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[9999]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md mx-4">
        <div class="text-center mb-6">
            <i class="fa-solid fa-mug-hot text-5xl text-amber-500"></i>
            <h2 class="text-2xl font-bold mt-3">تسجيل دخول الإدارة</h2>
        </div>
        <form id="loginForm" class="space-y-4">
            <input id="email" type="email" placeholder="البريد الإلكتروني" required class="w-full border rounded-lg px-4 py-3">
            <input id="password" type="password" placeholder="كلمة المرور" required class="w-full border rounded-lg px-4 py-3">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold">تسجيل الدخول</button>
            <p id="loginError" class="text-center text-red-500 text-sm"></p>
        </form>
    </div>
</div>


    <div class="flex h-screen overflow-hidden">
        
        <div class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="h-16 flex items-center justify-center bg-slate-950 font-bold text-xl tracking-wide border-b border-slate-800">
                <i class="fa-solid mt-1 ml-2 fa-mug-hot text-amber-500"></i> FPs Coffee
            </div>
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="#" class="flex items-center px-4 py-2.5 bg-blue-600 text-white rounded-lg transition-colors">
                    <i class="fa-solid fa-house ml-3 w-5"></i> الرئيسية
                </a>
            </nav>
            <div class="p-4 border-t border-slate-800 text-sm text-slate-500 text-center">
                إصدار النظام 1.0
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-y-auto overflow-x-hidden">
            
            <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
                <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 w-64">
                    <i class="fa-solid fa-magnifying-glass text-gray-400 ml-2"></i>
                    <input type="text" id="adminSearch" placeholder="بحث سريع في الفروع..." onkeyup="window.searchAdminBranches()" class="bg-transparent focus:outline-none text-sm w-full">
                </div>
                <div class="flex items-center space-x-4 space-x-reverse">
                    <div class="relative">
        <button id="userMenuBtn" class="flex items-center cursor-pointer">
            <span id="adminEmail" class="text-sm font-medium text-gray-700 ml-2">مدير النظام</span>
            <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">M</div>
        </button>
        <div id="userDropdown" class="hidden absolute left-0 top-12 w-48 bg-white rounded-xl shadow-lg border z-50">
            <button onclick="window.logout()" class="w-full text-right px-4 py-3 hover:bg-red-50 text-red-600">
                تسجيل الخروج
            </button>
        </div>
    </div>
                </div>
            </header>

            <main class="p-6 space-y-6 flex-1">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div class="w-14 h-14 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500 text-2xl order-last">
                            <i class="fa-solid fa-store"></i>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-400 font-medium">إجمالي عدد الفروع</p>
                            <h3 id="firebase-branches-count" class="text-3xl font-bold text-gray-800 mt-1">جاري التحميل...</h3>
                            <span class="text-xs text-blue-500 font-semibold flex items-center mt-2">
                                <i class="fa-solid fa-circle-check ml-1"></i> محدث حياً من Firebase
                            </span>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                        <div class="w-14 h-14 rounded-xl bg-green-50 flex items-center justify-center text-green-500 text-2xl order-last">
                            <i class="fa-solid fa-eye"></i>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-gray-400 font-medium">إجمالي عدد الزيارات</p>
                            <h3 id="total-visits-count" class="text-3xl font-bold text-gray-800 mt-1">0</h3>
                            <span class="text-xs text-green-500 font-semibold flex items-center mt-2">
                                <i class="fa-solid fa-circle-check ml-1"></i> قراءة حية ومباشرة
                            </span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex items-center justify-between">
                        <h4 class="text-lg font-bold text-gray-800">قائمة الفروع الحالية</h4>
                        <button onclick="window.openModal()" class="flex items-center bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors">
                            <i class="fa-solid fa-plus ml-2"></i> إضافة فرع جديد
                        </button>
                    </div>

                    <div id="branches-list-container" class="space-y-3">
                        <div class="text-center text-gray-400 py-8">جاري جلب الفروع الحالية...</div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <div id="branchModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg mx-4 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[90vh]">
            
            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
                <h3 id="modalTitle" class="font-bold text-gray-800 text-lg">إضافة فرع جديد</h3>
                <button type="button" onclick="window.closeModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="branchForm" class="p-6 space-y-4 overflow-y-auto flex-1">
                <input type="hidden" id="branchId">

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">اسم الفرع (بالعربي)</label>
                        <input type="text" id="branchNameAr" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">اسم الفرع (بالإنجليزي)</label>
                        <input type="text" id="branchNameEn" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">اسم مدير الفرع</label>
                        <input type="text" id="managerName" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">رقم هاتف المدير</label>
                        <input type="text" id="managerPhone" required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-left" dir="ltr">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">مواعيد العمل (مثال: من 9 صباحاً إلى 10 مساءً)</label>
                    <input type="text" id="workingHours" required placeholder="من 9 صباحاً إلى 11 مساءً" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">رابط موقع الفرع على الخريطة (Google Maps URL)</label>
                    <input type="url" id="branchLocation" placeholder="https://maps.app.goo.gl/..." required class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-left" dir="ltr">
                </div>

                <div class="border-t border-gray-100 pt-4 mt-2">
                    <div class="flex items-center justify-between mb-3">
                        <span class="inline-block bg-amber-50 text-amber-700 text-xs px-2.5 py-1 rounded-md font-bold">بيانات الموظفين</span>
                        <button type="button" onclick="window.addEmployeeField()" class="text-xs bg-amber-500 hover:bg-amber-600 text-white px-2.5 py-1 rounded-md font-semibold transition-colors">
                            <i class="fa-solid fa-plus ml-1"></i> إضافة موظف آخر
                        </button>
                    </div>

                    <div id="employees-fields-container" class="space-y-3"></div>
                </div>

                <div class="flex items-center justify-end space-x-2 space-x-reverse pt-4 border-t border-gray-100 flex-shrink-0">
                    <button type="button" onclick="window.closeModal()" class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium transition-colors">إلغاء</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-semibold shadow-sm transition-colors">حفظ البيانات</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
            authDomain: "breadfast-coffee.firebaseapp.com",
            projectId: "breadfast-coffee",
            storageBucket: "breadfast-coffee.firebasestorage.app",
            messagingSenderId: "803906042715",
            appId: "1:803906042715:web:1e8977716adc54947b787e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let localBranchesCache = [];

        onAuthStateChanged(auth, (user) => {

    document.body.classList.remove("opacity-0");

    if (user) {

        loginPage.classList.add("hidden");

        const adminEmail = document.getElementById("adminEmail");

        if (adminEmail) {
            adminEmail.textContent = user.email;
        }

    } else {

        loginPage.classList.remove("hidden");
    }
});
        document.getElementById("loginForm").addEventListener("submit", async (e)=>{
            e.preventDefault();
            try{
                await signInWithEmailAndPassword(
                    auth,
                    document.getElementById("email").value,
                    document.getElementById("password").value
                );
                document.getElementById("loginError").textContent = "";
            }catch(err){
                document.getElementById("loginError").textContent = "الإيميل أو كلمة المرور غير صحيحة";
            }
        });

        window.logout = async function(){
            await signOut(auth);
        };

        const menuBtn = document.getElementById("userMenuBtn");
        const dropdown = document.getElementById("userDropdown");

        if(menuBtn){
            menuBtn.addEventListener("click", (e)=>{
                e.stopPropagation();
                dropdown.classList.toggle("hidden");
            });
        }

        document.addEventListener("click", ()=>{
            if(dropdown){
                dropdown.classList.add("hidden");
            }
        });


        // 1. الاستماع المباشر لقاعدة البيانات
        onSnapshot(collection(db, "branches"), (snapshot) => {
            const data = [];
            let totalVisits = 0;

            snapshot.forEach(doc => {
                const bData = doc.data();
                data.push({ id: doc.id, ...bData });
                if(bData.visits) {
                    totalVisits += Number(bData.visits);
                }
            });

            localBranchesCache = data;
            document.getElementById("firebase-branches-count").innerText = data.length + " فروع";
            document.getElementById("total-visits-count").innerText = totalVisits.toLocaleString() + " زيارة";

            renderAdminBranches(data);
        });

        // 2. رندرة كروت الفروع في الصفحة مع تفعيل زر اللوكيشن الديناميكي
        function renderAdminBranches(list) {
            const container = document.getElementById("branches-list-container");
            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-400 py-8">لا توجد فروع حالياً.</div>`;
                return;
            }

            list.forEach(b => {
                const card = document.createElement("div");
                card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 transition-all hover:shadow-md";
                
                // التأكد من وجود لينك لوكيشن، وإذا لم يوجد نضع ديفولت
                const mapUrl = b.location || "https://maps.google.com";

                card.innerHTML = `
                    <div class="flex items-center space-x-4 space-x-reverse">
                        <a href="${mapUrl}" target="_blank" title="افتح الموقع على الخريطة" class="w-10 h-10 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg flex items-center justify-center text-lg font-bold flex-shrink-0 transition-colors">
                            <i class="fa-solid fa-location-dot"></i>
                        </a>
                        <div class="text-right">
                            <h5 class="font-bold text-gray-800 text-base">${b.nameAr || b.name} (${b.name || b.nameAr})</h5>
                            <p class="text-xs text-gray-400 mt-0.5">المدير: ${b.managerName || 'لا يوجد'} | هاتف: ${b.phone || 'لا يوجد'} | المواعيد: ${b.workingHours || 'غير محددة'}</p>
                            <span class="text-[11px] bg-amber-50 text-amber-700 px-2 py-0.5 rounded-md mt-1 inline-block font-medium">عدد الموظفين: ${(b.employees || []).length}</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2 space-x-reverse self-end sm:self-center">
                        <button onclick='window.prepareEdit("${b.id}")' class="text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center">
                            <i class="fa-solid fa-pen-to-square ml-1.5 text-xs"></i> تعديل
                        </button>
                        <button onclick='window.deleteBranch("${b.id}")' class="text-red-600 hover:bg-red-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center">
                            <i class="fa-solid fa-trash ml-1.5 text-xs"></i> حذف
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 3. حفظ وإضافة وتعديل الفروع في Firebase
        document.getElementById("branchForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const bId = document.getElementById("branchId").value;
            const nameAr = document.getElementById("branchNameAr").value;
            const nameEn = document.getElementById("branchNameEn").value;
            const managerName = document.getElementById("managerName").value;
            const managerPhone = document.getElementById("managerPhone").value;
            const workingHours = document.getElementById("workingHours").value;
            const locationUrl = document.getElementById("branchLocation").value;

            const employeeRows = document.querySelectorAll(".employee-row");
            let employeesArray = [];
            
            employeeRows.forEach(row => {
                const empName = row.querySelector(".emp-name-input").value;
                const empPhone = row.querySelector(".emp-phone-input").value;
                if(empName.trim() !== "") {
                    employeesArray.push({ name: empName, phone: empPhone });
                }
            });

            const docData = {
                nameAr: nameAr,
                name: nameEn,
                managerName: managerName,
                phone: managerPhone,
                workingHours: workingHours,
                location: locationUrl,
                employees: employeesArray
            };

            try {
                if (bId === "") {
                    docData.visits = 0;
                    await addDoc(collection(db, "branches"), docData);
                    alert("تم إضافة الفرع بنجاح!");
                } else {
                    await updateDoc(doc(db, "branches", bId), docData);
                    alert("تم تحديث بيانات الفرع بنجاح!");
                }
                window.closeModal();
            } catch (error) {
                alert("حدث خطأ أثناء الحفظ!");
            }
        });

        // 4. حذف الفرع من قاعدة البيانات
        window.deleteBranch = async function(id) {
            if (confirm("هل أنت متأكد من رغبتك في حذف هذا الفرع نهائياً؟")) {
                try {
                    await deleteDoc(doc(db, "branches", id));
                    alert("تم حذف الفرع بنجاح!");
                } catch (error) {
                    alert("فشل عملية الحذف!");
                }
            }
        };

        // 5. تجهيز الداتا للتعديل وتعبئة الحقول
        window.prepareEdit = function(id) {
            const b = localBranchesCache.find(item => item.id === id);
            if (!b) return;

            document.getElementById("branchId").value = b.id;
            document.getElementById("branchNameAr").value = b.nameAr || '';
            document.getElementById("branchNameEn").value = b.name || '';
            document.getElementById("managerName").value = b.managerName || '';
            document.getElementById("managerPhone").value = b.phone || '';
            document.getElementById("workingHours").value = b.workingHours || '';
            document.getElementById("branchLocation").value = b.location || '';
            
            const container = document.getElementById("employees-fields-container");
            container.innerHTML = "";
            
            if(b.employees && b.employees.length > 0) {
                b.employees.forEach(emp => {
                    window.addEmployeeField(emp.name || emp, emp.phone || '');
                });
            } else {
                window.addEmployeeField();
            }

            document.getElementById("modalTitle").innerText = "تعديل بيانات الفرع";
            window.openModal();
        };

        // 6. فلترة البحث في السيرش بار
        window.searchAdminBranches = function() {
            const query = document.getElementById("adminSearch").value.toLowerCase();
            const filtered = localBranchesCache.filter(b => {
                return (b.nameAr || "").toLowerCase().includes(query) || 
                       (b.name || "").toLowerCase().includes(query) || 
                       (b.managerName || "").toLowerCase().includes(query);
            });
            renderAdminBranches(filtered);
        };

        // 7. ربط دوال الـ UI بـ window لتعمل بشكل سليم وسلس فوراً
        window.addEmployeeField = function(name = '', phone = '') {
            const container = document.getElementById("employees-fields-container");
            const rowId = 'emp_' + Date.now() + Math.random().toString(36).substr(2, 4);

            const row = document.createElement("div");
            row.id = rowId;
            row.className = "employee-row grid grid-cols-1 sm:grid-cols-2 gap-4 bg-gray-50 p-3 rounded-lg border border-gray-100 relative pt-7 sm:pt-3 text-right";

            row.innerHTML = `
                <div>
                    <label class="block text-[10px] font-semibold text-gray-400 mb-1">اسم الموظف</label>
                    <input type="text" value="${name}" required class="emp-name-input w-full bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-400 mb-1">رقم هاتف الموظف</label>
                    <input type="text" value="${phone}" required class="emp-phone-input w-full bg-white border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-left" dir="ltr">
                </div>
                <button type="button" onclick="window.removeEmployeeField('${rowId}')" class="absolute top-1 left-2 sm:top-7 text-red-500 hover:text-red-700 text-sm">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            `;
            container.appendChild(row);
        };

        window.removeEmployeeField = function(id) {
            const row = document.getElementById(id);
            if(row) row.remove();
        };

        window.openModal = function() {
            const modal = document.getElementById('branchModal');
            const container = document.getElementById("employees-fields-container");
            if(container.innerHTML.trim() === "") {
                window.addEmployeeField();
            }
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 10);
        };

        window.closeModal = function() {
            const modal = document.getElementById('branchModal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById("branchForm").reset();
                document.getElementById("branchId").value = "";
                document.getElementById("employees-fields-container").innerHTML = "";
                document.getElementById("modalTitle").innerText = "إضافة فرع جديد";
            }, 300);
        };
    </script>
</body>
</html>
