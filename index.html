<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPs Location Coffee</title>

<link rel="icon" type="image/png" href="logo2.png">
<link rel="stylesheet" href="style.css">

<style>

/* ================== Skeleton Loading ================== */
.skeleton {
    background: #e2e8f0;
    border-radius: 10px;
    height: 45px;
    margin: 10px 0;
    position: relative;
    overflow: hidden;
}

.skeleton::after {
    content: "";
    position: absolute;
    top: 0;
    left: -150px;
    height: 100%;
    width: 150px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: loading 1s infinite;
}

@keyframes loading {
    100% { left: 100%; }
}

/* ================== Button Animation ================== */
.btn {
    display: block;
    padding: 12px;
    margin: 10px 0;
    background: #fff;
    border-radius: 12px;
    text-decoration: none;
    color: #111;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);

    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ================== Mobile App Feel ================== */
.phone{
    max-width:420px;
    margin:auto;
    padding:15px;
    font-family:Arial;
    background:#f8fafc;
    min-height:100vh;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin:10px 0;
}

.lang button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
}

.avatar{
    width:80px;
    border-radius:50%;
}

</style>
</head>

<body>

<div class="phone">

<div class="lang">
    <button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg">

<h1>Moaaz Mohamed</h1>
<p>Senior Manager</p>

<input type="text" id="search" placeholder="Search Location..." onkeyup="searchLocation()">

<!-- 🔥 Skeleton Loader -->
<div id="loading">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
</div>

<!-- 🔥 الفروع -->
<div id="branches"></div>

</div>

<script type="module" src="data.js"></script>

<script>

let isArabic = localStorage.getItem("language") === "ar";

const texts = {
en: {
    name: "Moaaz Mohamed",
    desc: "Senior Manager",
    langBtn: "العربية",
    search: "Search Location..."
},
ar: {
    name: "معاذ Mohamed",
    desc: "مدير أول",
    langBtn: "English",
    search: "ابحث عن المكان..."
}
};

// ================== Render Page ==================
function renderPage(){

    let lang = isArabic ? "ar" : "en";

    document.querySelector("h1").innerHTML = texts[lang].name;
    document.querySelector("p").innerHTML = texts[lang].desc;
    document.querySelector(".lang button").innerHTML = texts[lang].langBtn;

    document.getElementById("search").placeholder = texts[lang].search;

    document.documentElement.dir = isArabic ? "rtl" : "ltr";
}

// ================== Skeleton Hide ==================
function hideLoading(){
    document.getElementById("loading").style.display = "none";
}

// ================== Render Branches ==================
function renderBranches(list){

    const container = document.getElementById("branches");
    container.innerHTML = "";

    list.forEach((branch, i) => {

        const a = document.createElement("a");
        a.className = "btn";
        a.href = branch.map;
        a.target = "_blank";

        a.innerText = isArabic ? branch.nameAr : branch.name;

        // تأخير بسيط لAnimation شكل احترافي
        a.style.animationDelay = (i * 0.05) + "s";

        container.appendChild(a);
    });

    hideLoading();
}

// ================== Search ==================
function searchLocation(){

    let input = document.getElementById("search").value.toLowerCase();

    if(!window.branches) return;

    let filtered = window.branches.filter(b => {

        let name = (isArabic ? b.nameAr : b.name).toLowerCase();
        return name.includes(input);
    });

    renderBranches(filtered);
}

// ================== Change Language ==================
function changeLang(){

    isArabic = !isArabic;

    localStorage.setItem("language", isArabic ? "ar" : "en");

    renderPage();

    if(window.branches){
        renderBranches(window.branches);
    }
}

// ================== Init ==================
window.onload = function(){
    renderPage();
    document.getElementById("search").focus();
};

</script>

</body>
</html>
