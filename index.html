<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPs Location Coffee</title>

<link rel="icon" type="image/png" href="logo2.png">
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.phone{
    width:380px;
    min-height:750px;
    border-radius:25px;
    padding:20px;
    background:linear-gradient(145deg,#B00A8B,#d946ef,#fb923c);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.lang{
    width:100%;
    display:flex;
    justify-content:flex-end;
}

.lang button{
    background:rgba(255,255,255,0.2);
    border:1px solid rgba(255,255,255,0.4);
    color:white;
    padding:6px 12px;
    border-radius:20px;
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
}

#search{
    width:90%;
    padding:12px;
    border-radius:20px;
    border:none;
    text-align:center;
    margin:10px 0;
}

.btn{
    width:100%;
    background:white;
    color:black;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    text-decoration:none;
    text-align:center;
    font-weight:bold;
}

#loading{
    margin-top:10px;
}
</style>

</head>

<body>

<div class="phone">

<div class="lang">
    <button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg">

<h1></h1>
<p></p>

<input id="search" onkeyup="searchLocation()" placeholder="">

<div id="loading">Loading...</div>
<div id="branches"></div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
  authDomain: "breadfast-coffee.firebaseapp.com",
  projectId: "breadfast-coffee",
  storageBucket: "breadfast-coffee.firebasestorage.app",
  messagingSenderId: "803906042715",
  appId: "1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.branches = [];

onSnapshot(collection(db,"branches"), (snap)=>{

    let data = [];

    snap.forEach(d=>{
        data.push({id:d.id,...d.data()});
    });

    window.branches = data;

    document.getElementById("loading").style.display="none";

    renderBranches(window.branches);
});

</script>

<script>

let isArabic = localStorage.getItem("lang")==="ar";

const texts = {
en:{
    name:"Moaaz Mohamed",
    desc:"Senior Manager",
    search:"Search Location...",
    btn:"العربية"
},
ar:{
    name:"معاذ محمد",
    desc:"مدير أول",
    search:"ابحث عن المكان...",
    btn:"English"
}
};

function renderPage(){

    let lang = isArabic ? "ar" : "en";

    document.querySelector("h1").innerText = texts[lang].name;
    document.querySelector("p").innerText = texts[lang].desc;
    document.querySelector(".lang button").innerText = texts[lang].btn;
    document.getElementById("search").placeholder = texts[lang].search;
}

function renderBranches(list){

    let box = document.getElementById("branches");
    box.innerHTML="";

    list.forEach(b=>{

        let a=document.createElement("a");
        a.className="btn";
        a.href=b.map;
        a.target="_blank";
        a.innerText=isArabic?b.nameAr:b.name;

        box.appendChild(a);
    });
}

function searchLocation(){

    let val=document.getElementById("search").value.toLowerCase();

    let filtered=window.branches.filter(b=>{
        let name=(isArabic?b.nameAr:b.name).toLowerCase();
        return name.includes(val);
    });

    renderBranches(filtered);
}

function changeLang(){

    isArabic=!isArabic;

    localStorage.setItem("lang",isArabic?"ar":"en");

    renderPage();
    renderBranches(window.branches);
}

window.onload=function(){
    renderPage();
    document.getElementById("search").focus();
};

</script>

</body>
</html>
