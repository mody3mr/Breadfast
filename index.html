<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Branches</title>
<style>
body{font-family:Arial;background:#f3f4f6;margin:0;padding:30px}
.container{max-width:400px;margin:auto}
.btn{
  display:block;
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  text-decoration:none;
  color:#333;
  font-weight:bold;
  text-align:center;
  box-shadow:0 5px 15px #0001;
}
.btn:hover{transform:scale(1.02)}
</style>
</head>

<body>

<div class="container">
<h2>Branches</h2>
<div id="branches"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let branchesData = [];

onSnapshot(collection(db,"branches"), (snap)=>{

branchesData = [];

snap.forEach(d=>{
branchesData.push({id:d.id,...d.data()});
});

render();
});

function render(){
let box = document.getElementById("branches");
box.innerHTML="";

branchesData.forEach(b=>{

let a = document.createElement("a");
a.className="btn";
a.innerText = b.nameAr || b.name;

// 👇 مهم: نفتح صفحة تفاصيل
a.href = "branch.html?id=" + b.id;

box.appendChild(a);

});
}
</script>

</body>
</html>
