<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPs Location Coffee</title>

<link rel="icon" type="image/png" href="logo2.png">
<link rel="stylesheet" href="style.css">

<style>

/* ===== Skeleton Loading ===== */
.skeleton {
    height: 45px;
    margin: 8px 0;
    border-radius: 10px;
    background: linear-gradient(90deg,#eee,#f5f5f5,#eee);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
}

@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

/* ===== Button animation ===== */
.btn {
    display:block;
    opacity:0;
    transform: translateY(10px);
    animation: fadeIn 0.35s forwards;
}

@keyframes fadeIn {
    to {
        opacity:1;
        transform: translateY(0);
    }
}

/* ===== Fix layout ===== */
body {
    margin:0;
    font-family: Arial;
    background:#f7f7f7;
}

/* 👇 أهم حاجة عشان الصفحة ترجع في النص */
.phone {
    max-width:420px;
    margin:0 auto;
    padding:15px;
}

/* ===== Loading ===== */
#loading {
    margin-top: 10px;
}

/* ===== Footer fix ===== */
footer{
    text-align:center;
    padding:15px;
    font-size:13px;
    color:#777;
}

</style>

</head>

<body>

<div class="phone">

<div class="lang">
    <button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg" alt="profile">

<h1>Moaaz Mohamed</h1>
<p>Senior Manager</p>

<input type="text" id="search" placeholder="Search Location..." onkeyup="searchLocation()">

<!-- 🔥 Loading -->
<div id="loading"></div>

<!-- 🔥 Branches -->
<div id="branches"></div>

</div>

<!-- Footer (تحت الصفحة طبيعي) -->
<footer>
<p>© 2026 تم الإنشاء بواسطة | محمد عمرو ابراهيم</p>
</footer>

<!-- Firebase -->
<script type="module" src="data.js"></script>

<script>

let isArabic = localStorage.getItem("language") === "ar";

const texts = {
en: {
    name: "Moaaz Mohamed",
    desc: "Senior Manager",
    langBtn: "العربية",
    search: "Search Location..."
},
ar: {
    name: "معاذ Mohamed",
    desc: "مدير أول",
    langBtn: "English",
    search: "ابحث عن المكان..."
}
};

/* ===== Skeleton ===== */
function showSkeleton(count = 6){

    const loading = document.getElementById("loading");
    loading.innerHTML = "";
    loading.style.display = "block";

    for(let i=0;i<count;i++){
        const div = document.createElement("div");
        div.className = "skeleton";
        loading.appendChild(div);
    }
}

/* ===== Render Page ===== */
function renderPage(){

    let lang = isArabic ? "ar" : "en";

    document.querySelector("h1").innerHTML = texts[lang].name;
    document.querySelector("p").innerHTML = texts[lang].desc;
    document.querySelector(".lang button").innerHTML = texts[lang].langBtn;

    document.getElementById("search").placeholder = texts[lang].search;

    document.documentElement.dir = isArabic ? "rtl" : "ltr";
}

/* ===== Render Branches ===== */
function renderBranches(list){

    const container = document.getElementById("branches");
    const loading = document.getElementById("loading");

    container.innerHTML = "";

    // اخفاء loading لما الداتا تيجي
    loading.style.display = "none";

    list.forEach((branch, i) => {

        const a = document.createElement("a");
        a.className = "btn";
        a.href = branch.map;
        a.target = "_blank";

        a.innerText = isArabic ? branch.nameAr : branch.name;

        a.style.animationDelay = (i * 40) + "ms";

        container.appendChild(a);
    });
}

/* ===== Search ===== */
function searchLocation(){

    let input = document.getElementById("search").value.toLowerCase();

    if(!window.branches) return;

    let filtered = window.branches.filter(b => {
        let name = (isArabic ? b.nameAr : b.name).toLowerCase();
        return name.includes(input);
    });

    renderBranches(filtered);
}

/* ===== Change Lang ===== */
function changeLang(){

    isArabic = !isArabic;

    localStorage.setItem("language", isArabic ? "ar" : "en");

    renderPage();

    if(window.branches){
        renderBranches(window.branches);
    }
}

/* ===== Init ===== */
window.onload = function(){

    renderPage();

    showSkeleton();   // 🔥 loading شغال من أول فتح الصفحة

    document.getElementById("search").focus();
};

</script>

</body>
</html>
