<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPs Location Coffee</title>

<link rel="icon" type="image/png" href="logo2.png">
<link rel="stylesheet" href="style.css">

<style>

/* ===== Layout ===== */
body{
    margin:0;
    font-family:Arial;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
}

/* ===== CARD ===== */
.phone{
    width:380px;
    min-height:750px;
    margin-top:40px;
    padding:30px 20px;

    border-radius:30px;
    background:linear-gradient(145deg,#B00A8B,#d946ef,#fb923c);
    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

/* ===== LANG ===== */
.lang{
    width:100%;
    display:flex;
    justify-content:flex-end;
}

.lang button{
    background:rgba(255,255,255,0.2);
    color:white;
    border:1px solid rgba(255,255,255,0.4);
    padding:6px 14px;
    border-radius:20px;
}

/* ===== IMAGE ===== */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

/* ===== TEXT ===== */
h1{ font-size:22px; margin-top:10px; }
p{ font-size:14px; opacity:0.85; }

/* ===== SEARCH ===== */
#search{
    width:90%;
    padding:12px;
    margin:15px 0;
    border-radius:20px;
    border:none;
    text-align:center;
}

/* ===== BUTTON ===== */
.btn{
    width:100%;
    background:white;
    color:#222;
    text-decoration:none;
    padding:14px;
    border-radius:12px;
    font-weight:600;
    text-align:center;
    margin-top:10px;
}

/* ===== LOADING ===== */
#loading{
    width:100%;
    margin:10px 0;
}

.skeleton{
    height:45px;
    margin:8px 0;
    border-radius:10px;
    background:linear-gradient(90deg,#eee,#f5f5f5,#eee);
    background-size:200% 100%;
    animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
    0%{background-position:-200% 0;}
    100%{background-position:200% 0;}
}

/* ===== FOOTER داخل الكارت ===== */
footer{
    margin-top:15px;
    font-size:12px;
    opacity:0.7;
    text-align:center;
    width:100%;
}

</style>

</head>

<body>

<div class="phone">

<div class="lang">
    <button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg" alt="profile">

<h1>Moaaz Mohamed</h1>
<p>Senior Manager</p>

<input type="text" id="search" placeholder="Search Location..." onkeyup="searchLocation()">

<!-- LOADING -->
<div id="loading"></div>

<!-- BRANCHES -->
<div id="branches"></div>

<!-- FOOTER داخل الكارت -->
<footer>
<p>© 2026 تم الإنشاء بواسطة | محمد عمرو ابراهيم</p>
</footer>

</div>

<!-- Firebase -->
<script type="module" src="data.js"></script>

<script>

let isArabic = localStorage.getItem("language") === "ar";

const texts = {
en:{
    name:"Moaaz Mohamed",
    desc:"Senior Manager",
    langBtn:"العربية",
    search:"Search Location..."
},
ar:{
    name:"معاذ Mohamed",
    desc:"مدير أول",
    langBtn:"English",
    search:"ابحث عن المكان..."
}
};

/* ===== LOADING ===== */
function showSkeleton(){
    const loading = document.getElementById("loading");
    loading.innerHTML = "";

    for(let i=0;i<5;i++){
        const div = document.createElement("div");
        div.className = "skeleton";
        loading.appendChild(div);
    }
}

/* ===== RENDER PAGE ===== */
function renderPage(){
    let lang = isArabic ? "ar":"en";

    document.querySelector("h1").innerText = texts[lang].name;
    document.querySelector("p").innerText = texts[lang].desc;
    document.querySelector(".lang button").innerText = texts[lang].langBtn;
    document.getElementById("search").placeholder = texts[lang].search;

    document.documentElement.dir = isArabic ? "rtl":"ltr";
}

/* ===== RENDER BRANCHES ===== */
function renderBranches(list){

    const container = document.getElementById("branches");
    const loading = document.getElementById("loading");

    container.innerHTML = "";
    loading.style.display = "none";

    list.forEach((b,i)=>{

        const a = document.createElement("a");
        a.className = "btn";
        a.href = b.map;
        a.target = "_blank";
        a.innerText = isArabic ? b.nameAr : b.name;

        a.style.animationDelay = (i*40)+"ms";

        container.appendChild(a);
    });
}

/* ===== SEARCH ===== */
function searchLocation(){

    if(!window.branches) return;

    let val = document.getElementById("search").value.toLowerCase();

    let filtered = window.branches.filter(b=>{
        let name = (isArabic ? b.nameAr : b.name).toLowerCase();
        return name.includes(val);
    });

    renderBranches(filtered);
}

/* ===== LANGUAGE ===== */
function changeLang(){

    isArabic = !isArabic;
    localStorage.setItem("language", isArabic ? "ar":"en");

    renderPage();

    if(window.branches){
        renderBranches(window.branches);
    }
}

/* ===== INIT ===== */
window.onload = function(){

    renderPage();
    showSkeleton();
    document.getElementById("search").focus();

};

</script>

</body>
</html>
