<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>FPs Location Coffee</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

<div class="lang">
<button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg">

<h1 id="title">FPs Coffee</h1>
<p id="desc">Branches</p>

<input id="search" placeholder="Search..." onkeyup="searchLocation()">

<div id="loading">Loading...</div>
<div id="branches"></div>

<footer style="margin-top:auto;font-size:12px;opacity:0.7">
© 2026 Created by Mohamed Amr Ibrahim
</footer>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAvV18awCYpoXyDjpM4r2HKRztNxg8UgW8",
authDomain:"breadfast-coffee.firebaseapp.com",
projectId:"breadfast-coffee",
storageBucket:"breadfast-coffee.firebasestorage.app",
messagingSenderId:"803906042715",
appId:"1:803906042715:web:1e8977716adc54947b787e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.branches = [];

onSnapshot(collection(db,"branches"), (snap)=>{

let data = [];

snap.forEach(d=>{
data.push({id:d.id,...d.data()});
});

window.branches = data;

document.getElementById("loading").style.display="none";
render(window.branches);
});

function render(list){
let box=document.getElementById("branches");
box.innerHTML="";

list.forEach(b=>{
let a=document.createElement("a");
a.className="btn";
a.innerText=b.nameAr || b.name;
a.href="branch.html?id="+b.id;
box.appendChild(a);
});
}

window.searchLocation=function(){
let val=document.getElementById("search").value.toLowerCase();

let filtered=window.branches.filter(b=>{
return (b.nameAr||b.name).toLowerCase().includes(val);
});

render(filtered);
}

window.changeLang=function(){}
</script>

</body>
</html>
