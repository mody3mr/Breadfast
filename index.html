<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPs Location Coffee</title>

<link rel="icon" type="image/png" href="logo2.png">
<link rel="stylesheet" href="style.css">

<style>

/* ===== Reset بسيط ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:#f3f4f6;

    /* ❌ شلت المسافات اللي كانت مسببالك فراغ */
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== الكارت ===== */
.phone{
    width:380px;
    min-height:750px;
    border-radius:30px;
    padding:30px 20px;

    background: linear-gradient(145deg,#B00A8B,#d946ef,#fb923c);
    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;

    box-shadow:0 20px 60px rgba(0,0,0,0.25);

    position:relative;
}

/* زر اللغة */
.lang{
    width:100%;
    display:flex;
    justify-content:flex-end;
}

.lang button{
    background:rgba(255,255,255,0.2);
    color:white;
    border:1px solid rgba(255,255,255,0.4);
    padding:6px 14px;
    border-radius:20px;
}

/* الصورة */
.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-top:10px;
}

/* النص */
h1{
    font-size:22px;
    margin-top:10px;
}

p{
    font-size:14px;
    opacity:0.85;
    margin-top:5px;
}

/* البحث */
#search{
    width:90%;
    padding:12px;
    margin:15px auto;
    display:block;
    border-radius:20px;
    border:none;
    font-size:16px;
    text-align:center;
}

/* الأزرار */
.btn{
    width:100%;
    display:block;
    background:white;
    color:#222;
    text-decoration:none;
    padding:14px;
    border-radius:12px;
    font-weight:600;
    text-align:center;
    margin-top:10px;
}

/* ===== الفوتر جوه الكارد ===== */
footer{
    margin-top:auto;
    text-align:center;
    font-size:12px;
    opacity:0.8;
    padding-top:15px;
}

</style>
</head>

<body>

<div class="phone">

<div class="lang">
    <button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg" alt="profile">

<h1>Moaaz Mohamed</h1>
<p>Senior Manager</p>

<input type="text" id="search" placeholder="Search Location..." onkeyup="searchLocation()">

<!-- الفروع -->
<div id="branches"></div>

<!-- الفوتر جوه الكارد -->
<footer>
  <p>© 2026 تم الإنشاء بواسطة | محمد عمرو ابراهيم</p>
</footer>

</div>

<script src="data.js"></script>

<script>

let isArabic = localStorage.getItem("language") === "ar";

const texts = {
en: {
    name: "Moaaz Mohamed",
    desc: "Senior Manager",
    langBtn: "العربية",
    search: "Search Location..."
},
ar: {
    name: "معاذ Mohamed",
    desc: "مدير أول",
    langBtn: "English",
    search: "ابحث عن المكان..."
}
};

function renderPage(){

    let lang = isArabic ? "ar" : "en";

    document.querySelector("h1").innerHTML = texts[lang].name;
    document.querySelector("p").innerHTML = texts[lang].desc;
    document.querySelector(".lang button").innerHTML = texts[lang].langBtn;

    document.getElementById("search").placeholder = texts[lang].search;

    document.documentElement.dir = isArabic ? "rtl" : "ltr";
}

function renderBranches(list){

    const container = document.getElementById("branches");
    container.innerHTML = "";

    list.forEach(branch => {

        const a = document.createElement("a");
        a.className = "btn";
        a.href = branch.map;
        a.target = "_blank";

        a.innerText = isArabic ? branch.nameAr : branch.name;

        container.appendChild(a);
    });
}

function searchLocation(){

    let input = document.getElementById("search").value.toLowerCase();

    if(!window.branches) return;

    let filtered = window.branches.filter(b => {
        let name = (isArabic ? b.nameAr : b.name).toLowerCase();
        return name.includes(input);
    });

    renderBranches(filtered);
}

function changeLang(){

    isArabic = !isArabic;

    localStorage.setItem("language", isArabic ? "ar" : "en");

    renderPage();

    if(window.branches){
        renderBranches(window.branches);
    }
}

window.onload = function(){
    renderPage();
    document.getElementById("search").focus();
};

</script>

</body>
</html>
