<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPs Location Coffee</title>

<link rel="icon" type="image/png" href="logo2.png">
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f3f4f6;
    display:flex;
    justify-content:center;
}

.phone{
    width:380px;
    min-height:100vh;
    background:linear-gradient(145deg,#B00A8B,#d946ef,#fb923c);
    color:white;
    padding:20px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.lang{
    width:100%;
    display:flex;
    justify-content:flex-end;
}

.lang button{
    padding:6px 12px;
    border-radius:20px;
    border:1px solid white;
    background:transparent;
    color:white;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-top:10px;
}

#search{
    width:90%;
    padding:10px;
    border-radius:20px;
    border:none;
    margin:15px 0;
    text-align:center;
}

.btn{
    display:block;
    width:100%;
    background:white;
    color:black;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    text-decoration:none;
    text-align:center;
}

footer{
    margin-top:auto;
    font-size:12px;
    opacity:0.8;
}
</style>

</head>

<body>

<div class="phone">

<div class="lang">
    <button onclick="changeLang()">العربية</button>
</div>

<img class="avatar" src="breadfastlogo.jpg">

<h1>Moaaz Mohamed</h1>
<p>Senior Manager</p>

<input id="search" placeholder="Search..." onkeyup="searchLocation()">

<div id="branches"></div>

<footer>
© 2026 تم الإنشاء بواسطة | محمد عمرو ابراهيم
</footer>

</div>

<!-- Firebase -->
<script type="module" src="data.js"></script>

<script>

let isArabic = localStorage.getItem("lang") === "ar";

/* 🔥 أهم سطر */
window.renderBranches = renderBranches;

/* ================= FIRE EVENT ================= */
window.addEventListener("branchesReady", () => {
    renderBranches(window.branches);
});

/* ================= RENDER ================= */
function renderBranches(list){

    const container = document.getElementById("branches");
    container.innerHTML = "";

    list.forEach(b => {

        const a = document.createElement("a");
        a.className = "btn";
        a.href = b.map;
        a.target = "_blank";
        a.innerText = b.name;

        container.appendChild(a);
    });
}

/* ================= SEARCH ================= */
function searchLocation(){

    let value = document.getElementById("search").value.toLowerCase();

    if(!window.branches) return;

    let filtered = window.branches.filter(b =>
        b.name.toLowerCase().includes(value)
    );

    renderBranches(filtered);
}

/* ================= LANGUAGE ================= */
function changeLang(){

    isArabic = !isArabic;
    localStorage.setItem("lang", isArabic ? "ar" : "en");
}

</script>

</body>
</html>
